<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
<title>Farch Date Converter</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a4a6e;
    --surface: #1f5480;
    --orange: #f5a623;
    --orange-dark: #d4891a;
    --white: #ffffff;
    --muted: #93bcd8;
    --rule: #2a6090;
    --header-bg: #163858;
    --farch-gold-bg: rgba(245,166,35,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
  }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Nunito', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0.75rem 0.75rem;
    padding-bottom: calc(0.75rem + env(safe-area-inset-bottom));
  }

  .container {
    width: 100%;
    max-width: 520px;
  }

  /* ── Conversion Box ─────────────────────────────────────── */
  .converter {
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--rule);
    margin-bottom: 0.75rem;
    display: flex;
  }

  .converter-col {
    flex: 1;
    padding: 0.85rem 0.85rem 0.85rem;
  }

  .converter-col.old {
    border-right: 1px solid var(--rule);
  }

  .date-label {
    font-size: 0.65rem;
    font-weight: 800;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }
  .date-label.cold { color: var(--muted); }
  .date-label.warm { color: var(--orange); }

  .date-input-wrapper {
    margin-bottom: 0.5rem;
  }

  input[type="date"] {
    width: 100%;
    padding: 0;
    margin: 0;
    font-family: Georgia, "Times New Roman", serif;
    font-size: clamp(0.75rem, 2.5vw, 1.2rem);
    font-weight: 700;
    background: transparent;
    border: none;
    color: var(--muted);
    outline: none;
    cursor: pointer;
    color-scheme: dark;
    text-align: left;
    vertical-align: top;
    line-height: 1.25;
    display: block;
  }

  .edit-btn {
    padding: 0.2rem 0.5rem;
    font-family: 'Nunito', sans-serif;
    font-size: 0.6rem;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: var(--orange);
    color: var(--bg);
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s;
    display: inline-block;
    margin-top: 0.5rem;
  }
  .edit-btn:hover { background: var(--orange-dark); }

  .old-date-display {
    font-family: Georgia, "Times New Roman", serif;
    font-size: clamp(0.95rem, 3.8vw, 1.5rem);
    font-weight: 700;
    line-height: 1.25;
    color: var(--muted);
    margin-bottom: 0.5rem;
    word-break: break-word;
  }

  .farch-display {
    font-size: clamp(0.95rem, 3.8vw, 1.5rem);
    font-weight: 900;
    line-height: 1.25;
    color: var(--white);
    word-break: break-word;
    margin-bottom: 0.5rem;
  }
  .farch-display .day-name { color: var(--orange); }
  .farch-display.is-farch-period { color: var(--orange); }

  .nav-row {
    display: flex;
    gap: 0.4rem;
  }

  .nav-btn {
    width: 2.6rem;
    height: 2.6rem;
    padding: 0;
    font-size: 1.2rem;
    font-weight: 800;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--rule);
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, border-color 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-btn:hover { color: var(--orange); border-color: var(--orange); }
  .nav-btn:active { transform: translateY(1px); }

  .cal-farch-note {
    padding: 0.5rem 0.5rem 0.6rem;
    font-size: clamp(0.75rem, 2.2vw, 0.95rem);
    font-weight: 700;
    color: var(--orange);
    letter-spacing: 0.03em;
    text-align: left;
    line-height: 1.3;
  }

  /* ── Dual Calendars ─────────────────────────────────────── */
  .cal-row {
    display: flex;
    gap: 0.75rem;
    justify-content: center;
    align-items: flex-start;
  }

  .cal-box {
    flex: 1;
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--rule);
    overflow: hidden;
    max-width: 48%;
  }

  .cal-title {
    background: var(--header-bg);
    text-align: center;
    font-size: 0.6rem;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--orange);
    padding: 0.35rem 0.25rem;
  }

  .cal-month-label {
    background: var(--header-bg);
    text-align: center;
    font-size: clamp(0.65rem, 2vw, 0.85rem);
    font-weight: 800;
    color: var(--white);
    padding: 0.2rem 0.25rem 0.3rem;
  }

  .cal-grid {
    display: grid;
  }
  .cal-grid.greg { grid-template-columns: repeat(7, 1fr); }
  .cal-grid.farch-cal { grid-template-columns: repeat(6, 1fr); }

  .cal-day-header {
    background: var(--header-bg);
    text-align: center;
    font-size: clamp(0.45rem, 1.5vw, 0.58rem);
    font-weight: 800;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0.2rem 0;
  }

  .cal-cell {
    text-align: center;
    padding: 0;
    font-size: clamp(0.6rem, 1.8vw, 0.8rem);
    font-weight: 700;
    color: var(--white);
    position: relative;
    aspect-ratio: unset;
    height: clamp(1.6rem, 5vw, 2rem);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  /* Old calendar uses Georgia and muted color */
  #greg-grid .cal-cell,
  #greg-grid .cal-day-header {
    font-family: Georgia, "Times New Roman", serif;
    color: var(--muted);
    font-weight: 700;
  }
  #greg-month-label {
    font-family: Georgia, "Times New Roman", serif;
    color: var(--muted);
    font-weight: 700;
  }
  #greg-grid .cal-cell.highlighted {
    color: var(--bg);
  }

  .cal-cell.empty {
    cursor: default;
    color: transparent;
  }

  .cal-cell.muted-day { color: var(--muted); }

  .cal-cell.highlighted { color: var(--bg); }
  .cal-cell.highlighted::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 70%;
    aspect-ratio: 1;
    background: var(--orange);
    border-radius: 4px;
    z-index: 0;
  }
  .cal-cell span { position: relative; z-index: 1; }

  /* Farch intercalary row */
  .cal-farch-intercal {
    display: flex;
    padding: 0.3rem 0.25rem;
    gap: 0.2rem;
  }
  .cal-farch-intercal .cal-cell {
    flex: 1;
    aspect-ratio: 1;
  }
</style>
</head>
<body>
<div class="container">

  <!-- Conversion box -->
  <div class="converter">
    <!-- Old Date column -->
    <div class="converter-col old">
      <div class="date-label cold">Old Date</div>
      <div class="date-input-wrapper">
        <input type="date" id="date-picker" min="1900-01-01" max="2100-12-31" style="position:absolute;opacity:0;width:0;height:0;pointer-events:none;">
        <div class="old-date-display" id="old-date-display">—</div>
      </div>
      <button class="edit-btn" onclick="const p=document.getElementById('date-picker'); p.style.width='100%'; p.style.height='auto'; p.style.opacity='0.01'; p.focus(); p.click(); setTimeout(()=>{p.style.width='0'; p.style.height='0'; p.style.opacity='0';}, 500);">Change</button>
    </div>
    <!-- Farch Date column -->
    <div class="converter-col farch">
      <div class="date-label warm">Farch Date</div>
      <div class="farch-display" id="farch-display">—</div>
      <div class="nav-row">
        <button class="nav-btn" onclick="stepDate(-1)" aria-label="Previous day">&#8592;</button>
        <button class="nav-btn" onclick="stepDate(1)" aria-label="Next day">&#8594;</button>
      </div>
    </div>
  </div>

  <!-- Dual calendars -->
  <div class="cal-row">
    <!-- Gregorian calendar -->
    <div class="cal-box" id="greg-box">
      <div class="cal-month-label" id="greg-month-label"></div>
      <div class="cal-grid greg" id="greg-grid"></div>
    </div>

    <!-- Farch calendar -->
    <div class="cal-box" id="farch-box">
      <div class="cal-month-label" id="farch-month-label"></div>
      <div class="cal-grid farch-cal" id="farch-grid"></div>
      <div class="cal-farch-intercal" id="farch-intercal" style="display:none;"></div>
      <div class="cal-farch-note" id="cal-farch-note" style="display:none;">Farch is outside the regular calendar. No weekdays.</div>
    </div>
  </div>

</div>

<script>
  const GREG_DAYS  = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const FARCH_DAYS = ["Sun","Mon","Wed","Thu","Fri","Sat"];
  const GREG_MONTHS = ["January","February","March","April","May","June",
                       "July","August","September","October","November","December"];
  const FARCH_MONTHS = ["","January","February","March","April","May","June",
                        "July","August","September","October","November","December"];

  function isLeapYear(y) {
    return (y % 4 === 0 && y % 100 !== 0) || (y % 400 === 0);
  }

  function gregorianToFarch(gDate) {
    const year = gDate.getUTCFullYear();
    const dec22 = new Date(Date.UTC(year, 11, 22));
    let farchYear, farchYearStart;
    if (gDate >= dec22) {
      farchYear = year + 1;
      farchYearStart = dec22;
    } else {
      farchYear = year;
      farchYearStart = new Date(Date.UTC(year - 1, 11, 22));
    }
    const dayOfYear = Math.round((gDate - farchYearStart) / 86400000) + 1;
    if (dayOfYear <= 360) {
      const farchMonth = Math.ceil(dayOfYear / 30);
      const farchDay = ((dayOfYear - 1) % 30) + 1;
      const dayName = FARCH_DAYS[(farchDay - 1) % 6];
      return {
        year: farchYear, month: farchMonth,
        monthName: FARCH_MONTHS[farchMonth],
        day: farchDay, dayName, isFarch: false,
        formatted: `${dayName}, ${FARCH_MONTHS[farchMonth]} ${farchDay}, ${farchYear}`
      };
    } else {
      const farchDay = dayOfYear - 360;
      const maxFarch = isLeapYear(farchYear) ? 6 : 5;
      if (farchDay > maxFarch) return { error: true };
      return {
        year: farchYear, month: 13, monthName: "Farch",
        day: farchDay, dayName: null, isFarch: true,
        formatted: `Farch ${farchDay}, ${farchYear}`
      };
    }
  }

  // Convert Farch date back to a Gregorian date for tapping
  function farchToGregorian(farchYear, farchMonth, farchDay) {
    const farchYearStart = new Date(Date.UTC(farchYear - 1, 11, 22));
    let dayOfYear;
    if (farchMonth <= 12) {
      dayOfYear = (farchMonth - 1) * 30 + farchDay;
    } else {
      dayOfYear = 360 + farchDay;
    }
    return new Date(farchYearStart.getTime() + (dayOfYear - 1) * 86400000);
  }

  // Which Farch year does a given Gregorian date belong to?
  function getFarchYear(gDate) {
    const year = gDate.getUTCFullYear();
    const dec22 = new Date(Date.UTC(year, 11, 22));
    return gDate >= dec22 ? year + 1 : year;
  }

  // The Gregorian date start of a Farch year
  function farchYearStart(farchYear) {
    return new Date(Date.UTC(farchYear - 1, 11, 22));
  }

  let currentDate = null; // always a UTC Date

  function setDate(d) {
    currentDate = d;
    const y = d.getUTCFullYear();
    const m = String(d.getUTCMonth() + 1).padStart(2,'0');
    const day = String(d.getUTCDate()).padStart(2,'0');
    document.getElementById('date-picker').value = `${y}-${m}-${day}`;

    const dayNames = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    const monthNames = ["Jan","Feb","Mar","Apr","May","Jun",
                        "Jul","Aug","Sep","Oct","Nov","Dec"];
    document.getElementById('old-date-display').innerHTML =
      `${dayNames[d.getUTCDay()]}, ${monthNames[d.getUTCMonth()]} ${d.getUTCDate()}<br>${y}`;

    updateDisplay();
  }

  function stepDate(delta) {
    if (!currentDate) return;
    setDate(new Date(currentDate.getTime() + delta * 86400000));
  }

  function updateDisplay() {
    const result = gregorianToFarch(currentDate);
    const dispEl = document.getElementById('farch-display');

    if (!result || result.error) {
      dispEl.textContent = "—";
    } else if (result.isFarch) {
      dispEl.innerHTML = `Farch ${result.day}<br><span style="color:var(--white)">${result.year}</span>`;
      dispEl.className = 'farch-display is-farch-period';
    } else {
      dispEl.innerHTML = `<span class="day-name">${result.dayName}</span>, ${result.monthName.slice(0,3)} ${result.day}<br>${result.year}`;
      dispEl.className = 'farch-display';
    }

    renderGregCal();
    renderFarchCal(result);
  }

  // ── Gregorian Calendar ──────────────────────────────────────
  function renderGregCal() {
    const grid = document.getElementById('greg-grid');
    const label = document.getElementById('greg-month-label');
    grid.innerHTML = '';

    const y = currentDate.getUTCFullYear();
    const m = currentDate.getUTCMonth();
    const todayDay = currentDate.getUTCDate();

    label.textContent = `${GREG_MONTHS[m].slice(0,3)} ${y}`;

    // Headers
    GREG_DAYS.forEach(d => {
      const h = document.createElement('div');
      h.className = 'cal-day-header';
      h.textContent = d;
      grid.appendChild(h);
    });

    // First day of month
    const firstDow = new Date(Date.UTC(y, m, 1)).getUTCDay();
    // Empty cells
    for (let i = 0; i < firstDow; i++) {
      const e = document.createElement('div');
      e.className = 'cal-cell empty';
      e.innerHTML = '<span></span>';
      grid.appendChild(e);
    }

    // Days in month
    const daysInMonth = new Date(Date.UTC(y, m + 1, 0)).getUTCDate();
    for (let d = 1; d <= daysInMonth; d++) {
      const cell = document.createElement('div');
      const isHighlighted = d === todayDay;
      cell.className = 'cal-cell' + (isHighlighted ? ' highlighted' : '');
      cell.innerHTML = `<span>${d}</span>`;
      cell.addEventListener('click', () => {
        setDate(new Date(Date.UTC(y, m, d)));
      });
      grid.appendChild(cell);
    }
  }

  function renderFarchCal(result) {
    const grid = document.getElementById('farch-grid');
    const intercal = document.getElementById('farch-intercal');
    const label = document.getElementById('farch-month-label');
    const note = document.getElementById('cal-farch-note');
    grid.innerHTML = '';
    intercal.innerHTML = '';

    if (!result || result.error) return;

    const farchYear = result.year;

    if (result.isFarch) {
      label.innerHTML = `<span style="color:var(--orange)">Farch</span> ${farchYear}`;
      grid.style.display = 'none';
      intercal.style.display = 'flex';
      note.style.display = 'block';

      const maxDays = isLeapYear(farchYear) ? 6 : 5;
      for (let i = 1; i <= maxDays; i++) {
        const cell = document.createElement('div');
        cell.className = 'cal-cell' + (i === result.day ? ' highlighted' : '');
        cell.innerHTML = `<span style="${i !== result.day ? 'color:var(--orange)' : ''}">${i}</span>`;
        const dayNum = i;
        cell.addEventListener('click', () => {
          const gDate = farchToGregorian(farchYear, 13, dayNum);
          setDate(gDate);
        });
        intercal.appendChild(cell);
      }
    } else {
      grid.style.display = 'grid';
      intercal.style.display = 'none';
      note.style.display = 'none';

      const fMonth = result.month;
      label.textContent = `${result.monthName.slice(0,3)} ${farchYear}`;

      FARCH_DAYS.forEach(d => {
        const h = document.createElement('div');
        h.className = 'cal-day-header';
        h.textContent = d;
        grid.appendChild(h);
      });

      for (let d = 1; d <= 30; d++) {
        const cell = document.createElement('div');
        const isHighlighted = d === result.day;
        cell.className = 'cal-cell' + (isHighlighted ? ' highlighted' : '');
        cell.innerHTML = `<span>${d}</span>`;
        const dayNum = d;
        cell.addEventListener('click', () => {
          const gDate = farchToGregorian(farchYear, fMonth, dayNum);
          setDate(gDate);
        });
        grid.appendChild(cell);
      }
    }
  }

  // ── Init ────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    const now = new Date();
    const today = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
    setDate(today);

    document.getElementById('date-picker').addEventListener('change', e => {
      if (!e.target.value) return;
      const [y, m, d] = e.target.value.split('-').map(Number);
      setDate(new Date(Date.UTC(y, m - 1, d)));
    });

    // Prevent double-tap zoom on iOS Safari
    let lastTap = 0;
    document.addEventListener('touchend', e => {
      const now = Date.now();
      if (now - lastTap < 300) e.preventDefault();
      lastTap = now;
    }, { passive: false });

    // Prevent pinch zoom
    document.addEventListener('gesturestart', e => e.preventDefault(), { passive: false });
    document.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });
    document.addEventListener('touchmove', e => {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });
  });
</script>
</body>
</html>
