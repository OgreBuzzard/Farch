<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
<title>Farch Date Converter</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&family=Work+Sans:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a4a6e;
    --surface: #1f5480;
    --orange: #f5a623;
    --orange-dark: #d4891a;
    --white: #ffffff;
    --muted: #93bcd8;
    --rule: #2a6090;
    --header-bg: #163858;
    --farch-gold-bg: rgba(245,166,35,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
  }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Nunito', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 0.5rem 0.75rem;
    padding-bottom: calc(0.5rem + env(safe-area-inset-bottom));
  }

  .container {
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    max-height: 100dvh;
  }

  .container-top {
    flex-shrink: 0;
    margin-bottom: 0.5rem;
  }

  .container-middle {
    flex-shrink: 0;
  }

  .container-bottom {
    flex-shrink: 0;
    margin-top: 0.5rem;
  }

  /* ── Conversion Box ───────────────────────────────────────── */
  .converter {
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--rule);
    margin-bottom: 0.75rem;
    display: flex;
  }

  .converter-col { flex: 1; padding: clamp(0.5rem, 2vw, 0.85rem); }
  .converter-col.old { border-right: 1px solid var(--rule); }

  .date-label {
    font-size: 0.65rem;
    font-weight: 800;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }
  .date-label.cold { color: var(--muted); }
  .date-label.warm { color: var(--orange); }

  .old-date-display {
    font-family: Georgia, "Times New Roman", serif;
    font-size: clamp(1.1rem, 4.5vw, 1.8rem);
    font-weight: 700; line-height: 1.25;
    color: var(--muted); word-break: break-word;
  }

  .farch-display {
    font-size: clamp(1.1rem, 4.5vw, 1.8rem);
    font-weight: 900; line-height: 1.25;
    color: var(--white); word-break: break-word;
  }
  .farch-display .day-name { color: var(--orange); }
  .farch-display.is-farch-period { color: var(--orange); }

  /* ── Dual Calendars ───────────────────────────────────────── */
  .cal-row {
    display: flex; gap: 0.75rem;
    justify-content: center; align-items: flex-start;
    min-height: clamp(11rem, 32dvh, 14rem);
  }

  .cal-box {
    flex: 1; background: var(--surface);
    border-radius: 8px; border: 1px solid var(--rule);
    overflow: hidden; width: 100%;
  }

  /* Slide animation container */
  .cal-body {
    position: relative;
    overflow: hidden;
    transition: height 0.28s ease;
  }

  .cal-slide {
    width: 100%;
    transition: transform 0.28s ease, opacity 0.28s ease;
  }

  .cal-slide.slide-out-left  { transform: translateX(-100%); opacity: 0; position: absolute; top: 0; left: 0; width: 100%; }
  .cal-slide.slide-out-right { transform: translateX(100%);  opacity: 0; position: absolute; top: 0; left: 0; width: 100%; }
  .cal-slide.slide-in-left   { transform: translateX(100%);  opacity: 0; }
  .cal-slide.slide-in-right  { transform: translateX(-100%); opacity: 0; }
  .cal-slide.slide-active    { transform: translateX(0);      opacity: 1; }

  .cal-month-label {
    background: var(--header-bg);
    text-align: center;
    font-size: clamp(0.65rem, 2vw, 0.85rem);
    font-weight: 800; color: var(--white);
    padding: 0.2rem 0.25rem 0.3rem;
  }

  .cal-grid { display: grid; }
  .cal-grid.greg      { grid-template-columns: repeat(7, 1fr); }
  .cal-grid.farch-cal { grid-template-columns: repeat(6, 1fr); }

  .cal-day-header {
    background: var(--header-bg);
    text-align: center;
    font-size: clamp(0.45rem, 1.5vw, 0.58rem);
    font-weight: 800; letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--muted); padding: 0.2rem 0;
  }

  .cal-cell {
    text-align: center; padding: 0;
    font-size: clamp(0.6rem, 1.8vw, 0.8rem);
    font-weight: 700; color: var(--white);
    position: relative; aspect-ratio: unset;
    height: clamp(1.4rem, 4.5vw, 2rem);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }

  #greg-grid .cal-cell,
  #greg-grid .cal-day-header {
    font-family: Georgia, "Times New Roman", serif;
    color: var(--muted); font-weight: 700;
  }
  #greg-month-label {
    font-family: Georgia, "Times New Roman", serif;
    color: var(--muted); font-weight: 700;
  }
  #greg-grid .cal-cell.highlighted { color: var(--bg); }

  .cal-cell.empty { cursor: default; color: transparent; }
  .cal-cell.highlighted { color: var(--bg); }
  .cal-cell.highlighted::before {
    content: '';
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 70%; aspect-ratio: 1;
    background: var(--orange); border-radius: 4px; z-index: 0;
  }
  .cal-cell span { position: relative; z-index: 1; }
  .cal-cell .holiday-icon { width: 85%; height: 85%; object-fit: contain; display: block; margin: auto; transition: width 0.15s, height 0.15s; }
  .cal-cell.highlighted .holiday-icon { width: 62%; height: 62%; }

  .cal-farch-intercal {
    display: flex; padding: 0.3rem 0.25rem; gap: 0.2rem;
  }
  .cal-farch-intercal .cal-cell { flex: 1; aspect-ratio: 1; min-width: 0; }
  .cal-farch-intercal .holiday-icon { width: 70%; height: 70%; }
  .cal-farch-intercal .cal-cell.highlighted .holiday-icon { width: 55%; height: 55%; }

  .cal-farch-note {
    padding: 0.5rem 0.5rem 0.6rem;
    font-size: clamp(0.75rem, 2.2vw, 0.95rem);
    font-weight: 700; color: var(--orange);
    letter-spacing: 0.03em; text-align: left; line-height: 1.3;
  }

  /* ── Day arrows ───────────────────────────────────────────── */
  .day-nav-row { display: none; } /* removed — using combined row */

  /* ── Combined arrow row: ← month | ← day · day → | month → */
  .arrow-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0;
    margin-bottom: 0.1rem;
    width: 100%;
  }

  .arrow-spacer {
    flex: 1;
  }

  .month-nav-btn {
    width: 3.5rem; height: 3.5rem; padding: 0;
    font-size: 1.65rem; font-weight: 800;
    background: transparent; color: var(--muted);
    border: 1px solid var(--rule); border-radius: 8px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: color 0.15s, border-color 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .month-nav-btn:hover { color: var(--orange); border-color: var(--orange); }
  .month-nav-btn:active { transform: translateY(1px); }

  .day-nav-btn {
    width: 2.65rem; height: 2.65rem; padding: 0;
    font-size: 1.2rem; font-weight: 800;
    background: transparent; color: var(--muted);
    border: 1px solid var(--rule); border-radius: 6px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: color 0.15s, border-color 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .day-nav-btn:hover { color: var(--orange); border-color: var(--orange); }
  .day-nav-btn:active { transform: translateY(1px); }

  /* ── Month-jump arrows ────────────────────────────────────── */
  .month-nav-row { display: none; } /* removed — using combined row */

  /* ── Curtain animation groups ─────────────────────────────── */
  .anim-left, .anim-right { flex: 1; max-width: 48%; }

  #anim-converter,
  #anim-left,
  #anim-right,
  #anim-month-prev,
  #anim-month-next,
  #anim-day-prev,
  #anim-day-next,
  #anim-why-farch {
    transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                opacity 0.45s ease;
    will-change: transform, opacity;
  }

  /* Exit states */
  #anim-converter.exit-up     { transform: translateY(-130%); opacity: 0; }
  #anim-left.exit-left        { transform: translateX(-130%); opacity: 0; }
  #anim-right.exit-right      { transform: translateX(130%);  opacity: 0; }
  #anim-month-prev.exit-left  { transform: translateX(-130%); opacity: 0; }
  #anim-month-next.exit-right { transform: translateX(130%);  opacity: 0; }
  #anim-day-prev.exit-left    { transform: translateX(-130%); opacity: 0; }
  #anim-day-next.exit-right   { transform: translateX(130%);  opacity: 0; }
  #anim-why-farch.exit-down   { transform: translateY(130%);  opacity: 0; }

  /* ── Why Farch button ─────────────────────────────────────── */
  .why-farch-row {
    display: flex;
    justify-content: center;
    margin-top: 2.5rem;
  }

  .why-farch-btn {
    background: transparent;
    border: 1.5px solid var(--rule);
    border-radius: 8px;
    color: var(--orange);
    font-family: 'Nunito', sans-serif;
    font-size: 1.35rem;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 0.5rem 1.25rem;
    transition: opacity 0.2s, background 0.2s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  .why-farch-btn:hover { background: rgba(245,166,35,0.1); }

  /* Prevent text selection on all interactive elements */
  button {
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }

  * {
    touch-action: manipulation;
  }

  /* ── Presentation Overlay ─────────────────────────────────── */
  .pres-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }

  .pres-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }

  .pres-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem 1.25rem 1rem;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .pres-footer {
    padding: 0.75rem 1.25rem;
    padding-bottom: calc(0.75rem + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--rule);
  }

  .pres-back-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: 'Nunito', sans-serif;
    font-size: 0.8rem;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 0.25rem 0.5rem;
    transition: color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .pres-back-btn:hover { color: var(--white); }

  /* ── Chapter pie progress ─────────────────────────────────── */
  .pres-pie-wrap {
    width: 2.8rem;
    height: 2.8rem;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }

  .pres-pie-wrap svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  .pres-pie-slice {
    transition: opacity 0.4s ease;
    cursor: pointer;
  }

  /* ── Scene elements ───────────────────────────────────────── */
  .scene {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.25rem;
  }

  .scene-title {
    font-size: clamp(1.4rem, 5vw, 2rem);
    font-weight: 900;
    color: var(--white);
    text-align: center;
    line-height: 1.15;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 1.4s cubic-bezier(0.25, 0, 0.1, 1), transform 1.4s cubic-bezier(0.25, 0, 0.1, 1);
  }

  .scene-title.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .scene-body {
    font-size: clamp(1.35rem, 4.5vw, 1.65rem);
    font-weight: 600;
    color: var(--muted);
    text-align: center;
    line-height: 1.5;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 1.4s cubic-bezier(0.25, 0, 0.1, 1) 0.3s, transform 1.4s cubic-bezier(0.25, 0, 0.1, 1) 0.3s;
  }

  .scene-body.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .scene-highlight {
    color: var(--orange);
    font-weight: 900;
  }

  .scene-graphic {
    opacity: 0;
    transform: scale(0.94);
    transition: opacity 1.2s cubic-bezier(0.25, 0, 0.1, 1) 0.2s, transform 1.2s cubic-bezier(0.25, 0, 0.1, 1) 0.2s;
  }

  .scene-graphic.visible {
    opacity: 1;
    transform: scale(1);
  }

  /* For persistent graphics that should not fade in/out between beats */
  .scene-graphic-static {
    opacity: 1;
  }

  /* ── Presentation nav arrows (above footer) ──────────────── */
  .pres-nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 1.25rem 0.5rem;
    min-height: 3.2rem;
  }

  .pres-nav-btn {
    width: 3.2rem; height: 3.2rem;
    background: transparent;
    border: 1.5px solid var(--rule);
    border-radius: 8px;
    color: var(--muted);
    font-size: 1.5rem;
    font-weight: 800;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.4s ease, transform 0.35s cubic-bezier(0.4,0,0.2,1), color 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
    opacity: 0;
    pointer-events: none;
  }
  .pres-nav-btn:hover { color: var(--orange); border-color: var(--orange); }
  .pres-nav-btn:active { transform: translateY(1px); }

  .pres-nav-btn.visible {
    opacity: 1;
    pointer-events: auto;
  }
  .pres-nav-btn.fade-out {
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
  }
  /* back btn slides in from left, fwd from right */
  .pres-nav-back { transform: translateX(-2rem); }
  .pres-nav-back.visible { transform: translateX(0); }
  .pres-nav-fwd  { transform: translateX(2rem); }
  .pres-nav-fwd.visible  { transform: translateX(0); }
    bottom: 1rem;
    right: 1.25rem;
    font-size: 0.6rem;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--rule);
    opacity: 0;
    transition: opacity 1s ease 1.5s;
  }
  .tap-hint.visible { opacity: 1; }
</style>
</head>
<body>
<div class="container">

  <!-- TOP: Converter box — stays fixed -->
  <div class="container-top">
    <!-- Conversion box -->
    <div class="converter" id="anim-converter">
    <div class="converter-col old">
      <div class="date-label cold">Old Date</div>
      <div class="old-date-display" id="old-date-display">—</div>
    </div>
    <div class="converter-col farch">
      <div class="date-label warm">Farch Date</div>
      <div class="farch-display" id="farch-display">—</div>
    </div>
  </div><!-- /.converter -->
  </div><!-- /.container-top -->

  <!-- MIDDLE: Calendars — grow and shrink here -->
  <div class="container-middle">

    <!-- Dual calendars -->
    <div class="cal-row">
    <div class="anim-left" id="anim-left">
      <div class="cal-box" id="greg-box">
        <div class="cal-month-label" id="greg-month-label"></div>
        <div class="cal-body" id="greg-body">
          <div class="cal-slide slide-active" id="greg-slide">
            <div class="cal-grid greg" id="greg-grid"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="anim-right" id="anim-right">
      <div class="cal-box" id="farch-box">
        <div class="cal-month-label" id="farch-month-label"></div>
        <div class="cal-body" id="farch-body">
          <div class="cal-slide slide-active" id="farch-slide">
            <div class="cal-grid farch-cal" id="farch-grid"></div>
            <div class="cal-farch-intercal" id="farch-intercal" style="display:none;"></div>
            <div class="cal-farch-note" id="cal-farch-note" style="display:none;">Farch is outside the regular calendar. No weekdays.</div>
          </div>
        </div>
      </div>
    </div>
  </div><!-- /.cal-row -->
  </div><!-- /.container-middle -->

  <!-- BOTTOM: Arrows and Why Farch — stays fixed -->
  <div class="container-bottom">

    <!-- Combined arrow row: ← month | ← day · day → | month → -->
    <div class="arrow-row">
      <div class="arrow-spacer"></div>
      <button class="month-nav-btn" id="anim-month-prev" onclick="stepMonth(-1)" aria-label="Previous month">&#8592;</button>
      <div class="arrow-spacer"></div>
      <button class="day-nav-btn"   id="anim-day-prev"   onclick="stepDate(-1)"  aria-label="Previous day">&#8592;</button>
      <div style="flex:0.5"></div>
      <button class="day-nav-btn"   id="anim-day-next"   onclick="stepDate(1)"   aria-label="Next day">&#8594;</button>
      <div class="arrow-spacer"></div>
      <button class="month-nav-btn" id="anim-month-next" onclick="stepMonth(1)"  aria-label="Next month">&#8594;</button>
      <div class="arrow-spacer"></div>
    </div>

    <!-- Why Farch entry point -->
    <div class="why-farch-row" id="anim-why-farch">
      <button class="why-farch-btn" onclick="openPresentation()">Why Farch?</button>
    </div>

  </div><!-- /.container-bottom -->

</div><!-- /.container -->

<!-- Presentation overlay -->
<div class="pres-overlay" id="pres-overlay">
  <div class="pres-screen" id="pres-screen">
    <!-- Scene content renders here -->
  </div>
  <div class="pres-nav-row">
    <button class="pres-nav-btn pres-nav-back" id="pres-nav-back" onclick="presGoBack()">&#8592;</button>
    <button class="pres-nav-btn pres-nav-fwd" id="pres-nav-fwd" onclick="presGoForward()">&#8594;</button>
  </div>
  <div class="pres-footer">
    <button class="pres-back-btn" onclick="closePresentation()">&#8592; Back</button>
    <div class="pres-pie-wrap" id="pres-pie-wrap">
      <svg id="pres-pie-svg" viewBox="0 0 44 44"></svg>
    </div>
  </div>
</div>

<script>
  const GREG_DAYS   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const FARCH_DAYS  = ["Sun","Mon","Wed","Thu","Fri","Sat"];
  const GREG_MONTHS = ["January","February","March","April","May","June",
                       "July","August","September","October","November","December"];
  const FARCH_MONTHS = ["","January","February","March","April","May","June",
                        "July","August","September","October","November","December"];

  function isLeapYear(y) {
    return (y % 4 === 0 && y % 100 !== 0) || (y % 400 === 0);
  }

  function gregorianToFarch(gDate) {
    const year = gDate.getUTCFullYear();
    const dec22 = new Date(Date.UTC(year, 11, 22));
    let farchYear, farchYearStart;
    if (gDate >= dec22) {
      farchYear = year + 1;
      farchYearStart = dec22;
    } else {
      farchYear = year;
      farchYearStart = new Date(Date.UTC(year - 1, 11, 22));
    }
    const dayOfYear = Math.round((gDate - farchYearStart) / 86400000) + 1;
    if (dayOfYear <= 360) {
      const farchMonth = Math.ceil(dayOfYear / 30);
      const farchDay = ((dayOfYear - 1) % 30) + 1;
      const dayName = FARCH_DAYS[(farchDay - 1) % 6];
      return {
        year: farchYear, month: farchMonth,
        monthName: FARCH_MONTHS[farchMonth],
        day: farchDay, dayName, isFarch: false,
        formatted: `${dayName}, ${FARCH_MONTHS[farchMonth]} ${farchDay}, ${farchYear}`
      };
    } else {
      const farchDay = dayOfYear - 360;
      const maxFarch = isLeapYear(farchYear) ? 6 : 5;
      if (farchDay > maxFarch) return { error: true };
      return {
        year: farchYear, month: 13, monthName: "Farch",
        day: farchDay, dayName: null, isFarch: true,
        formatted: `Farch ${farchDay}, ${farchYear}`
      };
    }
  }

  function farchToGregorian(farchYear, farchMonth, farchDay) {
    const farchYearStart = new Date(Date.UTC(farchYear - 1, 11, 22));
    const dayOfYear = farchMonth <= 12
      ? (farchMonth - 1) * 30 + farchDay
      : 360 + farchDay;
    return new Date(farchYearStart.getTime() + (dayOfYear - 1) * 86400000);
  }

  let currentDate = null;

  // Track previous month IDs to detect month changes
  let prevGregMonthId  = null;
  let prevFarchMonthId = null;

  function monthId(y, m)  { return `${y}-${m}`; }
  function gregMonthId(d) { return monthId(d.getUTCFullYear(), d.getUTCMonth()); }
  function farchMonthId(r){ return r ? monthId(r.year, r.month) : null; }

  // ── Slide animation ──────────────────────────────────────────
  function slideCalendar(bodyEl, slideEl, direction, renderFn) {
    const outClass = direction > 0 ? 'slide-out-left'  : 'slide-out-right';
    const inClass  = direction > 0 ? 'slide-in-left'   : 'slide-in-right';

    // Clean up any orphaned slides from a previous rapid animation
    bodyEl.querySelectorAll('.cal-slide:not(.slide-active)').forEach(el => el.remove());

    // Measure current height and lock it
    const oldHeight = slideEl.offsetHeight;
    bodyEl.style.height = oldHeight + 'px';

    // Create new slide off-screen and render into it
    const newSlide = document.createElement('div');
    newSlide.className = `cal-slide ${inClass}`;
    newSlide.style.visibility = 'hidden';
    bodyEl.appendChild(newSlide);
    renderFn(newSlide);

    // Measure new height
    const newHeight = newSlide.offsetHeight;
    newSlide.style.visibility = '';

    // Start slide animation and height tween simultaneously
    requestAnimationFrame(() => {
      bodyEl.style.height = newHeight + 'px';

      slideEl.classList.remove('slide-active');
      slideEl.classList.add(outClass);
      newSlide.classList.remove(inClass);
      newSlide.classList.add('slide-active');

      setTimeout(() => {
        slideEl.remove();
        bodyEl.style.height = '';
      }, 300);
    });

    return newSlide;
  }

  // ── Holiday icons ────────────────────────────────────────────
  const HOLIDAY_ICONS = {
    halloween: 'assets/halloween.png',
    christmas: 'assets/christmas.png',
    turkey:    'assets/turkey.png',
    newyears:  'assets/newyears.png',
  };

  // Return icon key if this Greg date is a holiday, else null
  function gregHoliday(y, m, d) {
    // m is 0-based
    if (m === 9  && d === 31) return 'halloween';   // Oct 31
    if (m === 11 && d === 25) return 'christmas';   // Dec 25
    if (m === 11 && d === 31) return 'newyears';    // Dec 31
    // Thanksgiving: 4th Thursday in November
    if (m === 10) {
      let thursdays = 0;
      for (let day = 1; day <= d; day++) {
        if (new Date(Date.UTC(y, 10, day)).getUTCDay() === 4) thursdays++;
      }
      if (thursdays === 4 && new Date(Date.UTC(y, 10, d)).getUTCDay() === 4) return 'turkey';
    }
    return null;
  }

  // Return icon key if this Farch date is a holiday, else null
  function farchHoliday(farchMonth, farchDay, farchYear) {
    if (farchMonth === 10 && farchDay === 30) return 'halloween';  // Oct 30
    if (farchMonth === 11 && farchDay === 22) return 'turkey';     // Nov 22
    if (farchMonth === 12 && farchDay === 25) return 'christmas';  // Dec 25
    if (farchMonth === 13) {
      const maxFarch = isLeapYear(farchYear) ? 6 : 5;
      if (farchDay === maxFarch) return 'newyears';                // Last day of Farch
    }
    return null;
  }

  function holidayImg(key) {
    return `<span><img src="${HOLIDAY_ICONS[key]}" class="holiday-icon" alt="${key}"></span>`;
  }

  // ── Render Greg calendar into a container ───────────────────
  function buildGregContent(container, y, m, highlightDay) {
    const grid = document.createElement('div');
    grid.className = 'cal-grid greg';
    grid.id = 'greg-grid';

    GREG_DAYS.forEach(d => {
      const h = document.createElement('div');
      h.className = 'cal-day-header';
      h.textContent = d;
      grid.appendChild(h);
    });

    const firstDow = new Date(Date.UTC(y, m, 1)).getUTCDay();
    for (let i = 0; i < firstDow; i++) {
      const e = document.createElement('div');
      e.className = 'cal-cell empty';
      e.innerHTML = '<span></span>';
      grid.appendChild(e);
    }

    const daysInMonth = new Date(Date.UTC(y, m + 1, 0)).getUTCDate();
    for (let d = 1; d <= daysInMonth; d++) {
      const cell = document.createElement('div');
      const isHighlighted = d === highlightDay;
      cell.className = 'cal-cell' + (isHighlighted ? ' highlighted' : '');
      const icon = gregHoliday(y, m, d);
      cell.innerHTML = icon ? holidayImg(icon) : `<span>${d}</span>`;
      const day = d;
      cell.addEventListener('click', () => setDate(new Date(Date.UTC(y, m, day))));
      grid.appendChild(cell);
    }

    container.appendChild(grid);
  }

  let farchNoteShown = false;

  // ── Render Farch calendar into a container ──────────────────
  function buildFarchContent(container, result) {
    if (!result || result.error) return;
    const farchYear = result.year;

    if (result.isFarch) {
      const intercal = document.createElement('div');
      intercal.className = 'cal-farch-intercal';
      intercal.id = 'farch-intercal';
      const maxDays = isLeapYear(farchYear) ? 6 : 5;
      for (let i = 1; i <= maxDays; i++) {
        const cell = document.createElement('div');
        const isHighlighted = i === result.day;
        cell.className = 'cal-cell' + (isHighlighted ? ' highlighted' : '');
        const icon = farchHoliday(13, i, farchYear);
        if (icon) {
          cell.innerHTML = holidayImg(icon);
        } else {
          cell.innerHTML = `<span style="${!isHighlighted ? 'color:var(--orange)' : ''}">${i}</span>`;
        }
        const dayNum = i;
        cell.addEventListener('click', () => setDate(farchToGregorian(farchYear, 13, dayNum)));
        intercal.appendChild(cell);
      }
      container.appendChild(intercal);

      if (!farchNoteShown) {
        const note = document.createElement('div');
        note.className = 'cal-farch-note';
        note.id = 'cal-farch-note';
        note.textContent = 'Farch is outside the regular calendar. No weekdays.';
        container.appendChild(note);
        farchNoteShown = true;
      }
    } else {
      const grid = document.createElement('div');
      grid.className = 'cal-grid farch-cal';
      grid.id = 'farch-grid';

      FARCH_DAYS.forEach(d => {
        const h = document.createElement('div');
        h.className = 'cal-day-header';
        h.textContent = d;
        grid.appendChild(h);
      });

      const fMonth = result.month;
      for (let d = 1; d <= 30; d++) {
        const cell = document.createElement('div');
        const isHighlighted = d === result.day;
        cell.className = 'cal-cell' + (isHighlighted ? ' highlighted' : '');
        const icon = farchHoliday(fMonth, d, farchYear);
        cell.innerHTML = icon ? holidayImg(icon) : `<span>${d}</span>`;
        const dayNum = d;
        cell.addEventListener('click', () => setDate(farchToGregorian(farchYear, fMonth, dayNum)));
        grid.appendChild(cell);
      }
      container.appendChild(grid);
    }
  }

  // ── Main render ─────────────────────────────────────────────
  function updateDisplay(direction) {
    const d = currentDate;
    const result = gregorianToFarch(d);

    // Update conversion box
    const dispEl = document.getElementById('farch-display');
    if (!result || result.error) {
      dispEl.textContent = "—";
    } else if (result.isFarch) {
      dispEl.innerHTML = `Farch ${result.day}<br><span style="color:var(--white)">${result.year}</span>`;
      dispEl.className = 'farch-display is-farch-period';
    } else {
      dispEl.innerHTML = `<span class="day-name">${result.dayName}</span>, ${result.monthName.slice(0,3)} ${result.day}<br>${result.year}`;
      dispEl.className = 'farch-display';
    }

    // Check if month changed
    const newGregId  = gregMonthId(d);
    const newFarchId = farchMonthId(result);
    const gregChanged  = prevGregMonthId  !== null && newGregId  !== prevGregMonthId;
    const farchChanged = prevFarchMonthId !== null && newFarchId !== prevFarchMonthId;

    // If direction wasn't supplied by an arrow, infer it from whether we moved forward or back
    function inferDir(changed, oldId, newId) {
      if (!changed) return 0;
      if (direction !== 0) return direction;
      if (!oldId) return 1;
      const [oy, om] = oldId.split('-').map(Number);
      const [ny, nm] = newId.split('-').map(Number);
      return (ny * 100 + nm) > (oy * 100 + om) ? 1 : -1;
    }

    const gregDir  = inferDir(gregChanged,  prevGregMonthId,  newGregId);
    const farchDir = inferDir(farchChanged, prevFarchMonthId, newFarchId);

    // Update Gregorian calendar
    const gregMonthLabel = document.getElementById('greg-month-label');
    gregMonthLabel.textContent = `${GREG_MONTHS[d.getUTCMonth()].slice(0,3)} ${d.getUTCFullYear()}`;

    const gregBody = document.getElementById('greg-body');
    let gregSlide  = gregBody.querySelector('.cal-slide.slide-active');

    if (gregChanged && gregDir !== 0) {
      gregSlide = slideCalendar(gregBody, gregSlide, gregDir, (container) => {
        buildGregContent(container, d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate());
      });
    } else {
      gregSlide.innerHTML = '';
      buildGregContent(gregSlide, d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate());
    }

    // Update Farch calendar
    const farchMonthLabel = document.getElementById('farch-month-label');
    if (result && !result.error) {
      if (result.isFarch) {
        farchMonthLabel.innerHTML = `<span style="color:var(--orange)">Farch</span> ${result.year}`;
      } else {
        farchMonthLabel.textContent = `${result.monthName.slice(0,3)} ${result.year}`;
      }
    }

    const farchBody = document.getElementById('farch-body');
    let farchSlide  = farchBody.querySelector('.cal-slide.slide-active');

    if (farchChanged && farchDir !== 0) {
      farchSlide = slideCalendar(farchBody, farchSlide, farchDir, (container) => {
        buildFarchContent(container, result);
      });
    } else {
      farchSlide.innerHTML = '';
      buildFarchContent(farchSlide, result);
    }

    prevGregMonthId  = newGregId;
    prevFarchMonthId = newFarchId;
  }

  function setDate(d, direction) {
    currentDate = d;
    const y   = d.getUTCFullYear();
    const dayNames   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    document.getElementById('old-date-display').innerHTML =
      `${dayNames[d.getUTCDay()]}, ${monthNames[d.getUTCMonth()]} ${d.getUTCDate()}<br>${y}`;
    updateDisplay(direction ?? 0);
  }

  function stepDate(delta) {
    if (!currentDate) return;
    setDate(new Date(currentDate.getTime() + delta * 86400000), delta);
  }

  // ── Month jump ───────────────────────────────────────────────
  function stepMonth(delta) {
    if (!currentDate) return;

    const result = gregorianToFarch(currentDate);
    if (!result || result.error) return;

    const currentFarchDay = result.day;

    // Target: same Farch day number, 30 days forward/back in Farch
    let targetFarchMonth, targetFarchYear, targetFarchDay;

    if (result.isFarch) {
      // Currently in Farch intercalary
      if (delta > 0) {
        // Jump to Farch January of next year, same day (capped at 30)
        targetFarchYear  = result.year + 1;
        targetFarchMonth = 1;
        targetFarchDay   = Math.min(currentFarchDay, 30);
      } else {
        // Jump to Farch December of same year, same day (capped at 30)
        targetFarchYear  = result.year;
        targetFarchMonth = 12;
        targetFarchDay   = Math.min(currentFarchDay, 30);
      }
    } else {
      const newMonth = result.month + delta;
      if (newMonth < 1) {
        // Crossing back into Farch of previous year
        targetFarchYear  = result.year - 1;
        targetFarchMonth = 13;
        const maxFarch = isLeapYear(targetFarchYear) ? 6 : 5;
        targetFarchDay = Math.min(currentFarchDay, maxFarch);
      } else if (newMonth > 12) {
        // Crossing forward into Farch
        targetFarchYear  = result.year;
        targetFarchMonth = 13;
        const maxFarch = isLeapYear(targetFarchYear) ? 6 : 5;
        targetFarchDay = Math.min(currentFarchDay, maxFarch);
      } else {
        targetFarchYear  = result.year;
        targetFarchMonth = newMonth;
        targetFarchDay   = currentFarchDay;
      }
    }

    const newGreg = farchToGregorian(targetFarchYear, targetFarchMonth, targetFarchDay);
    setDate(newGreg, delta);
  }

  // ── Presentation Engine ──────────────────────────────────────

  // Each chapter is an array of beats. Each beat is a function
  // that receives the scene container and renders into it.
  const CHAPTERS = [

    // ── Chapter 1: The Problem ───────────────────────────────────
    // No pie slice during this chapter — pie only appears from ch2 onward
    [
      // Beat 1: opening statement
      (scene) => {
        scene.innerHTML = `
          <div class="scene-title">Our calendar is stupid<br>and no one likes it.</div>
        `;
        animate(scene);

      (scene) => {

          return `<path id="slice7-${i}" d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 0 1 ${x2},${y2} Z" fill="#3a9fd5" stroke="#ffffff" stroke-width="2.5" opacity="0"/>`;
        }).join('');

        scene.innerHTML = `
          <div id="seven-wrap" class="scene-graphic" style="display:flex;align-items:center;gap:1rem;justify-content:center;overflow:hidden;padding-left:1.5rem;">
            <div id="seven-num" style="transform:translateX(-120px);opacity:0;transition:transform 0.5s cubic-bezier(0.4,0,0.2,1),opacity 0.5s ease;">
              <svg viewBox="0 0 362 457" width="80" height="101" xmlns="http://www.w3.org/2000/svg">
                <text xml:space="preserve" x="3.78" y="428" font-family="'Work Sans',sans-serif" font-size="576" font-weight="700" fill="#ffffff">7</text>
              </svg>
            </div>
            <div id="seven-circle" style="transform:translateX(120px);opacity:0;transition:transform 0.5s cubic-bezier(0.4,0,0.2,1),opacity 0.5s ease;">
              <svg id="seven-svg" width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
                <circle cx="${cx}" cy="${cy}" r="${rCirc}" fill="#ffffff"/>
                ${sliceSVG}
              </svg>
            </div>
          </div>
          <div id="seven-caption" class="scene-body">A week is <span class="scene-highlight">7</span> days.</div>
        `;
        animate(scene);

        requestAnimationFrame(() => requestAnimationFrame(() => {
          const num  = document.getElementById('seven-num');
          const circ = document.getElementById('seven-circle');
          if (num)  { num.style.transform  = 'translateX(0)'; num.style.opacity  = '1'; }
          if (circ) { circ.style.transform = 'translateX(0)'; circ.style.opacity = '1'; }
          setTimeout(() => {
            for (let i = 0; i < 7; i++) {
              const el = document.getElementById(`slice7-${i}`);
              if (!el) continue;
              el.style.transition = 'opacity 0.5s ease';
              setTimeout(() => { el.style.opacity = '1'; }, i * 200);
            }
          }, 500);
        }));
      },

      // Beat 3: circle persists. Draw halves lines outward from center.
      (scene) => {
        const r = 70, rCirc = 72, cx = 80, cy = 80;
        const sliceSVG = Array.from({length:7}, (_,i) => {
          const a1 = (i * 2*Math.PI/7) - Math.PI/2;
          const a2 = a1 + 2*Math.PI/7;
          const x1 = (cx + r*Math.cos(a1)).toFixed(3); const y1 = (cy + r*Math.sin(a1)).toFixed(3);
          const x2 = (cx + r*Math.cos(a2)).toFixed(3); const y2 = (cy + r*Math.sin(a2)).toFixed(3);
          return `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 0 1 ${x2},${y2} Z" fill="#3a9fd5" stroke="#ffffff" stroke-width="2.5"/>`;
        }).join('');

        scene.innerHTML = `
          <div id="seven-wrap" class="scene-graphic-static" style="display:flex;align-items:center;gap:1rem;justify-content:center;padding-left:1.5rem;">
            <div id="seven-num">
              <svg viewBox="0 0 362 457" width="80" height="101" xmlns="http://www.w3.org/2000/svg">
                <text xml:space="preserve" x="3.78" y="428" font-family="'Work Sans',sans-serif" font-size="576" font-weight="700" fill="#ffffff">7</text>
              </svg>
            </div>
            <div id="seven-circle">
              <svg id="seven-svg" width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
                <circle cx="${cx}" cy="${cy}" r="${rCirc}" fill="#ffffff"/>
                ${sliceSVG}
              </svg>
            </div>
          </div>
          <div id="seven-caption" class="scene-body">It can't be split in <span class="scene-highlight">half</span>.</div>
        `;
        animateCaption(scene);

        requestAnimationFrame(() => requestAnimationFrame(() => {
          const svg = document.getElementById('seven-svg');
          if (!svg) return;
          [[0, -rCirc],[0, rCirc]].forEach(([dx, dy]) => {
            const line = document.createElementNS('http://www.w3.org/2000/svg','line');
            line.classList.add('half-line');
            line.setAttribute('x1', cx); line.setAttribute('y1', cy);
            line.setAttribute('x2', cx + dx); line.setAttribute('y2', cy + dy);

          requestAnimationFrame(() => requestAnimationFrame(() => {

          }));
        }));
      },

      // Beat 4: keep top half-line, reverse bottom half-line, draw lower-left and lower-right thirds spokes
      (scene) => {
        const r = 70, rCirc = 72, cx = 80, cy = 80;
        const sliceSVG = Array.from({length:7}, (_,i) => {
          const a1 = (i * 2*Math.PI/7) - Math.PI/2;
          const a2 = a1 + 2*Math.PI/7;
          const x1 = (cx + r*Math.cos(a1)).toFixed(3); const y1 = (cy + r*Math.sin(a1)).toFixed(3);
          const x2 = (cx + r*Math.cos(a2)).toFixed(3); const y2 = (cy + r*Math.sin(a2)).toFixed(3);

        }).join('');
        // Top half stays fully drawn. Bottom half will be reverse-animated.
        const halvesHTML = `
          <line id="half-top" x1="${cx}" y1="${cy}" x2="${cx}" y2="${cy-rCirc}" stroke="#cc3333" stroke-width="4" stroke-dasharray="${rCirc}" style="stroke-dashoffset:0;"/>
          <line id="half-bot" x1="${cx}" y1="${cy}" x2="${cx}" y2="${cy+rCirc}" stroke="#cc3333" stroke-width="4" stroke-dasharray="${rCirc}" style="stroke-dashoffset:0;transition:stroke-dashoffset 0.6s cubic-bezier(0.4,0,0.2,1);"/>
        `;

        scene.innerHTML = `
          <div id="seven-wrap" class="scene-graphic-static" style="display:flex;align-items:center;gap:1rem;justify-content:center;padding-left:1.5rem;">
            <div id="seven-num">
              <svg viewBox="0 0 362 457" width="80" height="101" xmlns="http://www.w3.org/2000/svg">
                <text xml:space="preserve" x="3.78" y="428" font-family="'Work Sans',sans-serif" font-size="576" font-weight="700" fill="#ffffff">7</text>
              </svg>
            </div>
            <div id="seven-circle">
              <svg id="seven-svg" width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
                <circle cx="${cx}" cy="${cy}" r="${rCirc}" fill="#ffffff"/>
                ${sliceSVG}
                ${halvesHTML}
              </svg>
            </div>
          </div>
          <div id="seven-caption" class="scene-body">Or into <span class="scene-highlight">thirds</span>.</div>
        `;
        animateCaption(scene);

        requestAnimationFrame(() => requestAnimationFrame(() => {
          const svg = document.getElementById('seven-svg');
          if (!svg) return;
          // Reverse only the bottom half
          const bot = document.getElementById('half-bot');
          if (bot) bot.style.strokeDashoffset = rCirc;

          // After reverse, draw lower-right (330° from 12) and lower-left (210° from 12)
          // 330° = -30° = -Math.PI/6 from positive x, offset by -Math.PI/2 = 5*Math.PI/6 - Math.PI/2... 
          // Simpler: 120° clockwise from top = Math.PI/2 + 2*Math.PI/3 - Math.PI = just use direct angles
          // Top spoke is straight up (270° from positive x = -Math.PI/2)
          // Other two are 120° apart: 30° from positive x (lower-right) and 150° from positive x (lower-left)
          const thirdsAngles = [
            Math.PI/6,        // 30° = lower-right
            5*Math.PI/6,      // 150° = lower-left
          ];
          setTimeout(() => {
            thirdsAngles.forEach((a, i) => {
              const ex = (cx + rCirc*Math.cos(a)).toFixed(3);
              const ey = (cy + rCirc*Math.sin(a)).toFixed(3);
              const line = document.createElementNS('http://www.w3.org/2000/svg','line');
              line.classList.add('third-line');
              line.setAttribute('x1', cx); line.setAttribute('y1', cy);
              line.setAttribute('x2', ex); line.setAttribute('y2', ey);
              line.setAttribute('stroke','#cc3333'); line.setAttribute('stroke-width','4');
              line.setAttribute('stroke-dasharray', rCirc);

              svg.appendChild(line);
            });
            requestAnimationFrame(() => requestAnimationFrame(() => {
              svg.querySelectorAll('.third-line').forEach(l => { l.style.strokeDashoffset = 0; });
            }));
          }, 700);
        }));
      },

      // Beat 5: reverse thirds, draw all 7 spokes (forward); or slide in with spokes drawn (backward)
      (scene) => {
        const r = 70, rCirc = 72, cx = 80, cy = 80;

          const a2 = a1 + 2*Math.PI/7;
          const x1 = (cx + r*Math.cos(a1)).toFixed(3); const y1 = (cy + r*Math.sin(a1)).toFixed(3);
          const x2 = (cx + r*Math.cos(a2)).toFixed(3); const y2 = (cy + r*Math.sin(a2)).toFixed(3);
          return `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 0 1 ${x2},${y2} Z" fill="#3a9fd5" stroke="#ffffff" stroke-width="2.5"/>`;
        }).join('');
        // 7 spokes — fully drawn when arriving backward, animated when arriving forward
        const spokesHTML = Array.from({length:7}, (_,i) => {
          const a = (i * 2*Math.PI/7) - Math.PI/2;
          const ex = (cx + rCirc*Math.cos(a)).toFixed(3);
          const ey = (cy + rCirc*Math.sin(a)).toFixed(3);
          return `<line x1="${cx}" y1="${cy}" x2="${ex}" y2="${ey}" stroke="#cc3333" stroke-width="3" stroke-dasharray="${rCirc}" style="stroke-dashoffset:0;"/>`;
        }).join('');

        const goingBack = presDirection === -1;

        if (goingBack) {
          // Slide in from off-screen with everything already drawn
          scene.innerHTML = `
            <div id="seven-wrap" class="scene-graphic" style="display:flex;align-items:center;gap:1rem;justify-content:center;overflow:hidden;padding-left:1.5rem;">
              <div id="seven-num" style="transform:translateX(-120px);opacity:0;transition:transform 0.5s cubic-bezier(0.4,0,0.2,1),opacity 0.5s ease;">
                <svg viewBox="0 0 362 457" width="80" height="101" xmlns="http://www.w3.org/2000/svg">
                  <text xml:space="preserve" x="3.78" y="428" font-family="'Work Sans',sans-serif" font-size="576" font-weight="700" fill="#ffffff">7</text>
                </svg>
              </div>
              <div id="seven-circle" style="transform:translateX(120px);opacity:0;transition:transform 0.5s cubic-bezier(0.4,0,0.2,1),opacity 0.5s ease;">
                <svg id="seven-svg" width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
                  <circle cx="${cx}" cy="${cy}" r="${rCirc}" fill="#ffffff"/>

            <img src="assets/pres/imaginary-constructs.png" alt="Countries, money, laws" style="max-width:320px;width:100%;">
          </div>
          <div class="scene-body">Countries. Money. Legal rights. These are all imaginary constructs that only exist because we agree that they do.</div>
        `;
        animate(scene);
      },
      // Beat 2: gravity listed — things start floating
      (scene) => {
        scene.innerHTML = `
          <div class="scene-graphic" id="gravity-scene">
            <img src="assets/pres/imaginary-floating.png" alt="Constructs floating away" style="max-width:320px;width:100%;" id="floating-img">
          </div>
          <div class="scene-body">Gravity.</div>
        `;
        animate(scene);
      },
      // Beat 3: thud — everything crashes back
      (scene) => {
        scene.innerHTML = `
          <div class="scene-graphic">
            <img src="assets/pres/imaginary-crashed.png" alt="Everything crashed back down" style="max-width:320px;width:100%;">
          </div>
          <div class="scene-body">Wait. Gravity's real.</div>
        `;
        animate(scene);
      },
      // Beat 4: the calendar is imaginary too
      (scene) => {
        scene.innerHTML = `
          <div class="scene-title">The calendar is imaginary too.</div>
          <div class="scene-body">In theory, we could change it. But the entire world has to change at once. There are no half-measures — if some people use Farch and some don't, the world just got more complicated, not less.</div>
        `;
        animate(scene);
      },
      // Beat 5: Beautiful Dead End — YOUR TEXT GOES HERE
      (scene) => {
        scene.innerHTML = `
          <div class="scene-title">A beautiful dead end.</div>

        `;
        animate(scene);
      },
    ],

  ];

  const TOTAL_CHAPTERS = CHAPTERS.length;
  let currentChapter = 0;
  let currentBeat    = 0;

  function animate(scene) {
    requestAnimationFrame(() => {
      scene.querySelectorAll('.scene-title, .scene-body, .scene-graphic').forEach(el => {
        requestAnimationFrame(() => el.classList.add('visible'));
      });
      const hint = scene.querySelector('.tap-hint');
      if (hint) hint.classList.add('visible');
    });
  }

  // For beats where the graphic persists — only fade in the caption text
  function animateCaption(scene) {
    requestAnimationFrame(() => {
      scene.querySelectorAll('.scene-title, .scene-body').forEach(el => {
        requestAnimationFrame(() => el.classList.add('visible'));
      });
    });
  }

  function renderBeat() {
    // If the Week/Month panel exists and the next beat is within the same panel group,
    // don't wipe the screen — let the beat function mutate the existing DOM instead.
    const wmExists = document.getElementById('wm-wrap');
    const wmBeats = new Set([7,8,9,10]); // chapter 1 beat indices (0-based: 7,8,9,10 = index 7-10)
    const isWmBeat = currentChapter === 0 && wmBeats.has(currentBeat);

    if (!(wmExists && isWmBeat)) {
      const screen = document.getElementById('pres-screen');
      screen.innerHTML = '<div class="scene" id="current-scene"></div><div class="tap-hint" style="display:none;"></div>';
    }

    const scene = document.getElementById('current-scene') || document.querySelector('.scene');
    CHAPTERS[currentChapter][currentBeat](scene);
    drawProgressPie();

    // Back arrow
    updateBackArrow();

    // Forward arrow
    if (isLastBeat()) {
      hideFwdArrow(true);
    } else {
      const delay = presFirstBeat ? 1400 : 0;
      presFirstBeat = false;
      showFwdArrow(delay);
    }
  }

  let presFirstBeat = true; // track if this is the very first beat of the session
  let presDirection = 1;    // 1 = forward, -1 = backward
  let presNavFwdTimer = null;
  let presNavFwdVisible = false; // track whether fwd arrow is currently shown

  function showFwdArrow(delay) {
    const btn = document.getElementById('pres-nav-fwd');
    if (!btn) return;
    clearTimeout(presNavFwdTimer);
    if (presNavFwdVisible) {
      // Already visible — no animation needed, just ensure classes are right
      btn.classList.remove('fade-out');
      btn.classList.add('visible');
      return;
    }
    // First appearance — slide in after delay
    btn.classList.remove('visible', 'fade-out');
    presNavFwdTimer = setTimeout(() => {
      btn.classList.add('visible');
      presNavFwdVisible = true;
    }, delay);
  }

  function hideFwdArrow(fade) {
    const btn = document.getElementById('pres-nav-fwd');
    if (!btn) return;
    clearTimeout(presNavFwdTimer);
    presNavFwdVisible = false;
    if (fade) {
      btn.classList.remove('visible');
      btn.classList.add('fade-out');
    } else {
      btn.classList.remove('visible', 'fade-out');
    }
  }

  function updateBackArrow() {
    const btn = document.getElementById('pres-nav-back');
    if (!btn) return;
    const hasPrev = currentChapter > 0 || currentBeat > 0;
    if (hasPrev) {
      btn.classList.add('visible');
    } else {
      btn.classList.remove('visible');
    }
  }

  function isLastBeat() {
    return currentChapter === TOTAL_CHAPTERS - 1 &&
           currentBeat === CHAPTERS[currentChapter].length - 1;
  }

  function presGoForward() {
    presDirection = 1;
    const chapter = CHAPTERS[currentChapter];

    // If leaving beat 6 (31 circle), animate it out first
    const numEl  = document.getElementById('thirtyone-num');
    const circEl = document.getElementById('thirtyone-circle');
    const isSlideScene = numEl && circEl &&
      (numEl.style.transform === 'translateX(0px)' || numEl.style.transform === 'translateX(0)');

    if (isSlideScene) {
      numEl.style.transition  = 'transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease';
      circEl.style.transition = 'transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease';
      numEl.style.transform   = 'translateX(-140px)';
      numEl.style.opacity     = '0';
      circEl.style.transform  = 'translateX(140px)';
      circEl.style.opacity    = '0';
      if (currentBeat < chapter.length - 1) { currentBeat++; }
      else if (currentChapter < TOTAL_CHAPTERS - 1) { currentChapter++; currentBeat = 0; }
      else return;
      setTimeout(() => renderBeat(), 360);
      return;
    }

    if (currentBeat < chapter.length - 1) {
      currentBeat++;
    } else if (currentChapter < TOTAL_CHAPTERS - 1) {
      currentChapter++;
      currentBeat = 0;
    } else {
      return;
    }
    renderBeat();
  }

  function presGoBack() {
    presDirection = -1;
    if (currentBeat > 0) {
      currentBeat--;
    } else if (currentChapter > 0) {
      currentChapter--;
      currentBeat = CHAPTERS[currentChapter].length - 1;
    } else {
      return;
    }

    // If the current scene has slide-in elements, animate them out first
    const numEl  = document.getElementById('thirtyone-num') || document.getElementById('seven-num');
    const circEl = document.getElementById('thirtyone-circle') || document.getElementById('seven-circle');
    const isSlideScene = numEl && circEl &&
      (numEl.style.transform === 'translateX(0px)' || numEl.style.transform === 'translateX(0)');

    if (isSlideScene) {
      numEl.style.transition  = 'transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease';
      circEl.style.transition = 'transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease';
      numEl.style.transform   = 'translateX(-140px)';
      numEl.style.opacity     = '0';
      circEl.style.transform  = 'translateX(140px)';
      circEl.style.opacity    = '0';
      setTimeout(() => renderBeat(), 360);
    } else {
      renderBeat();
    }
  }

  // ── Week/Month panel builder (back-nav fallback) ─────────────
  // Renders a static fully-built panel at the given stage
  function wmPanelFull(stage) {
    const ff = "'Work Sans',sans-serif", fs = '2.6rem', fw = '700', numW = '3.5rem';
    const slashImg = (id, file) =>

              ${stage >= 2 ? slashImg('slash2','slash2_red.png') : '<img id="slash2" src="assets/slash2_red.png" style="display:none;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);mix-blend-mode:screen;width:130%;pointer-events:none;clip-path:inset(0 100% 0 0);transition:clip-path 0.4s cubic-bezier(0.4,0,0.2,1);">'}

              <span style="font-family:${ff};font-size:${fs};font-weight:${fw};color:#fff;">28</span>
              ${stage >= 3 ? slashImg('slash3','slash3_red.png') : '<img id="slash3" src="assets/slash3_red.png" style="display:none;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);mix-blend-mode:screen;width:130%;pointer-events:none;clip-path:inset(0 100% 0 0);transition:clip-path 0.4s cubic-bezier(0.4,0,0.2,1);">'}
            </span>

  }
  // All rows are always present. Invisible ones have opacity:0.
  // stage: 0=only 31 visible, 1=31 struck+30 visible, 2=30 struck+28 visible, 3=28 struck+29 visible
  function wmPanel(stage) {
    const ff = "'Work Sans',sans-serif";
    const fs = '2.4rem';
    const fw = '700';
    const numStyle = `font-family:${ff};font-size:${fs};font-weight:${fw};color:#fff;min-width:2.5rem;text-align:right;position:relative;display:inline-block;`;

    const row28 = `<div style="${rowStyle};opacity:${stage >= 2 ? 1 : 0};">

  // Draws a wobbly, variable-weight marker slash across a number in the SVG.
  // Multiple overlapping lines at slight angle/position offsets simulate real marker feel.
  function wmSlash(svg, x1, y1, x2, y2) {
    const strokes = [
      { dx1:  0,   dy1:  1,   dx2:  0,   dy2: -1,   w: 2.5, op: 0.7 },
      { dx1:  1,   dy1:  0,   dx2: -1,   dy2:  0,   w: 5,   op: 0.9 },
      { dx1: -0.5, dy1:  1.5, dx2:  0.5, dy2: -1.5, w: 7,   op: 1.0 },
      { dx1:  0.5, dy1: -1,   dx2: -0.5, dy2:  1,   w: 4,   op: 0.8 },
      { dx1:  1.5, dy1:  0.5, dx2: -1.5, dy2: -0.5, w: 2,   op: 0.6 },
    ];
    const len = Math.hypot(x2 - x1, y2 - y1);
    strokes.forEach(s => {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', x1 + s.dx1); line.setAttribute('y1', y1 + s.dy1);
      line.setAttribute('x2', x2 + s.dx2); line.setAttribute('y2', y2 + s.dy2);
      line.setAttribute('stroke', '#cc3333');
      line.setAttribute('stroke-width', s.w);
      line.setAttribute('stroke-linecap', 'round');
      line.setAttribute('opacity', s.op);
      line.setAttribute('stroke-dasharray', len + 10);
      line.style.strokeDashoffset = len + 10;
      line.style.transition = 'stroke-dashoffset 0.35s cubic-bezier(0.4,0,0.2,1)';
      svg.appendChild(line);
    });
    requestAnimationFrame(() => requestAnimationFrame(() => {
      svg.querySelectorAll('line').forEach(l => { l.style.strokeDashoffset = 0; });
    }));
  }

  // Same but fully drawn immediately — for slashes that persist from a previous beat
  function wmSlashStatic(svg, x1, y1, x2, y2) {
    const strokes = [
      { dx1:  0,   dy1:  1,   dx2:  0,   dy2: -1,   w: 2.5, op: 0.7 },
      { dx1:  1,   dy1:  0,   dx2: -1,   dy2:  0,   w: 5,   op: 0.9 },
      { dx1: -0.5, dy1:  1.5, dx2:  0.5, dy2: -1.5, w: 7,   op: 1.0 },
      { dx1:  0.5, dy1: -1,   dx2: -0.5, dy2:  1,   w: 4,   op: 0.8 },
      { dx1:  1.5, dy1:  0.5, dx2: -1.5, dy2: -0.5, w: 2,   op: 0.6 },
    ];
    strokes.forEach(s => {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', x1 + s.dx1); line.setAttribute('y1', y1 + s.dy1);
      line.setAttribute('x2', x2 + s.dx2); line.setAttribute('y2', y2 + s.dy2);
      line.setAttribute('stroke', '#cc3333');
      line.setAttribute('stroke-width', s.w);
      line.setAttribute('stroke-linecap', 'round');
      line.setAttribute('opacity', s.op);
      svg.appendChild(line);
    });
  }

  function drawProgressPie() {
    const svg = document.getElementById('pres-pie-svg');
    const wrap = document.getElementById('pres-pie-wrap');
    if (!svg || !wrap) return;
    svg.innerHTML = '';

    const cx = 22, cy = 22, r = 18;
    const completedChapters = currentChapter;

    if (completedChapters === 0) {
      wrap.style.pointerEvents = 'none';
      return;
    }

    wrap.style.pointerEvents = 'auto';

    // Ghost circle
    const ghost = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    ghost.setAttribute('cx', cx); ghost.setAttribute('cy', cy); ghost.setAttribute('r', r);
    ghost.setAttribute('fill', 'none');
    ghost.setAttribute('stroke', '#2a6090');
    ghost.setAttribute('stroke-width', '1');
    svg.appendChild(ghost);

    const PIE_SLICES = 6; // always 6 — matches the 6-day week; chapter 1 has no slice
    const angleStep = (2 * Math.PI) / PIE_SLICES;

    for (let i = 0; i < completedChapters; i++) {
      const startAngle = i * angleStep - Math.PI / 2;
      const endAngle   = startAngle + angleStep;
      const x1 = cx + r * Math.cos(startAngle);
      const y1 = cy + r * Math.sin(startAngle);
      const x2 = cx + r * Math.cos(endAngle);
      const y2 = cy + r * Math.sin(endAngle);
      const largeArc = angleStep > Math.PI ? 1 : 0;

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', `M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${largeArc} 1 ${x2},${y2} Z`);
      path.setAttribute('fill', '#f5a623');
      path.setAttribute('stroke', '#1a4a6e');
      path.setAttribute('stroke-width', '1');
      svg.appendChild(path);
    }
  }

  function pieGoBack(e) {
    e.stopPropagation();
    if (currentChapter > 0) {
      currentChapter--;
      currentBeat = 0;
      renderBeat();
    }
  }

  function openPresentation() {
    currentChapter = 0;
    currentBeat    = 0;

    const whyEl   = document.getElementById('anim-why-farch');
    const convEl  = document.getElementById('anim-converter');
    const leftEl  = document.getElementById('anim-left');
    const rightEl = document.getElementById('anim-right');
    const mPrev   = document.getElementById('anim-month-prev');
    const mNext   = document.getElementById('anim-month-next');
    const dPrev   = document.getElementById('anim-day-prev');
    const dNext   = document.getElementById('anim-day-next');

    whyEl.classList.add('exit-down');

    setTimeout(() => {
      convEl.classList.add('exit-up');
      leftEl.classList.add('exit-left');
      rightEl.classList.add('exit-right');
      mPrev.classList.add('exit-left');
      mNext.classList.add('exit-right');
      dPrev.classList.add('exit-left');
      dNext.classList.add('exit-right');

    setTimeout(() => {
      const overlay = document.getElementById('pres-overlay');

      overlay.style.transform  = 'none';
      overlay.style.opacity    = '0';
      overlay.classList.add('open');

        overlay.style.transition = 'opacity 0.3s ease';

      });

  function closePresentation() {
    const overlay = document.getElementById('pres-overlay');
    overlay.style.transition = 'opacity 0.3s ease';
    overlay.style.opacity    = '0';

    setTimeout(() => {
      overlay.classList.remove('open');
      overlay.style.transition = '';
      overlay.style.transform  = '';
      overlay.style.opacity    = '';

      const convEl  = document.getElementById('anim-converter');
      const leftEl  = document.getElementById('anim-left');
      const rightEl = document.getElementById('anim-right');
      const mPrev   = document.getElementById('anim-month-prev');
      const mNext   = document.getElementById('anim-month-next');

      leftEl.classList.remove('exit-left');
      rightEl.classList.remove('exit-right');

      mNext.classList.remove('exit-right');
      dPrev.classList.remove('exit-left');
      dNext.classList.remove('exit-right');

      setTimeout(() => { convEl.classList.remove('exit-up'); }, 80);
      setTimeout(() => { whyEl.classList.remove('exit-down'); }, 160);

  // ── Interactive 360 wheel ────────────────────────────────────
  const DIVISIONS = [2, 3, 4, 5, 6, 8, 9, 10, 12, 15, 18, 20, 24, 30, 36, 40, 45, 60, 72, 90, 120, 180, 360];
  let divIndex = 0;

  function buildInteractive360() {
    return `
      <div class="scene-graphic" style="display:flex;flex-direction:column;align-items:center;gap:0.75rem;">
        <svg id="div360-svg" width="160" height="160" viewBox="0 0 160 160"></svg>
        <div style="display:flex;gap:0.5rem;align-items:center;">
          <button class="nav-btn" onclick="event.stopPropagation();stepDivision(-1)" style="width:2rem;height:2rem;font-size:1rem;">&#8592;</button>
          <div id="div360-label" style="font-size:1.1rem;font-weight:900;color:var(--orange);min-width:5rem;text-align:center;"></div>
          <button class="nav-btn" onclick="event.stopPropagation();stepDivision(1)" style="width:2rem;height:2rem;font-size:1rem;">&#8594;</button>
        </div>
      </div>
      <div class="scene-body">360 divides evenly by <span class="scene-highlight">24 different numbers</span>. Try them all.</div>
    `;
  }

  function initInteractive360(scene) {
    divIndex = 3; // start at ÷5
    drawDivision();
  }

  function stepDivision(delta) {
    divIndex = (divIndex + delta + DIVISIONS.length) % DIVISIONS.length;
    drawDivision();
  }

  function drawDivision() {
    const svg = document.getElementById('div360-svg');
    const label = document.getElementById('div360-label');
    if (!svg || !label) return;
    const n = DIVISIONS[divIndex];
    label.textContent = `÷ ${n} = ${360/n}°`;
    svg.innerHTML = buildPieSlices(n, Array.from({length:n},(_,i)=>i), '#f5a623', '#1f5480', 76, 80, 80);
  }

  function buildPieSlices(n, filledIndices, fillColor, emptyColor, r=60, cx=70, cy=70) {
    const slices = [];
    const angleStep = (2 * Math.PI) / n;
    for (let i = 0; i < n; i++) {
      const startAngle = i * angleStep - Math.PI / 2;
      const endAngle   = startAngle + angleStep;
      const x1 = cx + r * Math.cos(startAngle);
      const y1 = cy + r * Math.sin(startAngle);
      const x2 = cx + r * Math.cos(endAngle);
      const y2 = cy + r * Math.sin(endAngle);
      const largeArc = angleStep > Math.PI ? 1 : 0;
      const fill = filledIndices.includes(i) ? fillColor : emptyColor;
      slices.push(`<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${largeArc} 1 ${x2},${y2} Z" fill="${fill}" stroke="#1a4a6e" stroke-width="1.5"/>`);
    }
    // Outer circle stroke
    slices.push(`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#93bcd8" stroke-width="1.5" opacity="0.4"/>`);
    return slices.join('');
  }
  document.addEventListener('DOMContentLoaded', () => {
    const now   = new Date();
    const today = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));

    const convEl  = document.getElementById('anim-converter');
    const leftEl  = document.getElementById('anim-left');
    const rightEl = document.getElementById('anim-right');
    const mPrev   = document.getElementById('anim-month-prev');
    const mNext   = document.getElementById('anim-month-next');
    const dPrev   = document.getElementById('anim-day-prev');
    const dNext   = document.getElementById('anim-day-next');
    const whyEl   = document.getElementById('anim-why-farch');

    const allEls = [convEl, leftEl, rightEl, mPrev, mNext, dPrev, dNext, whyEl];

    allEls.forEach(el => { el.style.transition = 'none'; });

    convEl.classList.add('exit-up');
    leftEl.classList.add('exit-left');
    rightEl.classList.add('exit-right');
    mPrev.classList.add('exit-left');
    mNext.classList.add('exit-right');
    dPrev.classList.add('exit-left');
    dNext.classList.add('exit-right');
    whyEl.classList.add('exit-down');

    setDate(today, 0);

    requestAnimationFrame(() => {
      allEls.forEach(el => { el.style.transition = ''; });

      setTimeout(() => {
        leftEl.classList.remove('exit-left');
        rightEl.classList.remove('exit-right');
        mPrev.classList.remove('exit-left');
        mNext.classList.remove('exit-right');
        dPrev.classList.remove('exit-left');
        dNext.classList.remove('exit-right');
      }, 100);

      setTimeout(() => { convEl.classList.remove('exit-up'); }, 220);
      setTimeout(() => { whyEl.classList.remove('exit-down'); }, 340);
    });

    // Prevent all zoom — double-tap, pinch, and gesture
    // Prevent double-tap zoom — skip buttons so rapid tapping works freely
    let lastTap = 0;
    document.addEventListener('touchend', e => {
      if (e.target.closest('button')) return; // buttons never trigger zoom
      const now = Date.now();
      if (now - lastTap < 300) e.preventDefault();
      lastTap = now;
    }, { passive: false });

    document.addEventListener('touchstart', e => {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });

    document.addEventListener('gesturestart',  e => e.preventDefault(), { passive: false });
    document.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });
    document.addEventListener('gestureend',    e => e.preventDefault(), { passive: false });
    document.addEventListener('touchmove', e => {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });
  });
</script>
</body>
</html>
