<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
<title>Farch Date Converter</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a4a6e;
    --surface: #1f5480;
    --orange: #f5a623;
    --orange-dark: #d4891a;
    --white: #ffffff;
    --muted: #93bcd8;
    --rule: #2a6090;
    --header-bg: #163858;
    --farch-gold-bg: rgba(245,166,35,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
  }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Nunito', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 0.5rem 0.75rem;
    padding-bottom: calc(0.5rem + env(safe-area-inset-bottom));
  }

  .container {
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    max-height: 100dvh;
  }

  .container-top {
    flex-shrink: 0;
    margin-bottom: 0.5rem;
  }

  .container-middle {
    flex-shrink: 0;
  }

  .container-bottom {
    flex-shrink: 0;
    margin-top: 0.5rem;
  }

  /* ── Conversion Box ───────────────────────────────────────── */
  .converter {
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--rule);
    margin-bottom: 0.75rem;
    display: flex;
  }

  .converter-col { flex: 1; padding: clamp(0.5rem, 2vw, 0.85rem); }
  .converter-col.old { border-right: 1px solid var(--rule); }

  .date-label {
    font-size: 0.65rem;
    font-weight: 800;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }
  .date-label.cold { color: var(--muted); }
  .date-label.warm { color: var(--orange); }

  .old-date-display {
    font-family: Georgia, "Times New Roman", serif;
    font-size: clamp(1.1rem, 4.5vw, 1.8rem);
    font-weight: 700; line-height: 1.25;
    color: var(--muted); word-break: break-word;
  }

  .farch-display {
    font-size: clamp(1.1rem, 4.5vw, 1.8rem);
    font-weight: 900; line-height: 1.25;
    color: var(--white); word-break: break-word;
  }
  .farch-display .day-name { color: var(--orange); }
  .farch-display.is-farch-period { color: var(--orange); }

  /* ── Dual Calendars ───────────────────────────────────────── */
  .cal-row {
    display: flex; gap: 0.75rem;
    justify-content: center; align-items: flex-start;
    min-height: clamp(11rem, 32dvh, 14rem);
  }

  .cal-box {
    flex: 1; background: var(--surface);
    border-radius: 8px; border: 1px solid var(--rule);
    overflow: hidden; width: 100%;
  }

  /* Slide animation container */
  .cal-body {
    position: relative;
    overflow: hidden;
    transition: height 0.28s ease;
  }

  .cal-slide {
    width: 100%;
    transition: transform 0.28s ease, opacity 0.28s ease;
  }

  .cal-slide.slide-out-left  { transform: translateX(-100%); opacity: 0; position: absolute; top: 0; left: 0; width: 100%; }
  .cal-slide.slide-out-right { transform: translateX(100%);  opacity: 0; position: absolute; top: 0; left: 0; width: 100%; }
  .cal-slide.slide-in-left   { transform: translateX(100%);  opacity: 0; }
  .cal-slide.slide-in-right  { transform: translateX(-100%); opacity: 0; }
  .cal-slide.slide-active    { transform: translateX(0);      opacity: 1; }

  .cal-month-label {
    background: var(--header-bg);
    text-align: center;
    font-size: clamp(0.65rem, 2vw, 0.85rem);
    font-weight: 800; color: var(--white);
    padding: 0.2rem 0.25rem 0.3rem;
  }

  .cal-grid { display: grid; }
  .cal-grid.greg      { grid-template-columns: repeat(7, 1fr); }
  .cal-grid.farch-cal { grid-template-columns: repeat(6, 1fr); }

  .cal-day-header {
    background: var(--header-bg);
    text-align: center;
    font-size: clamp(0.45rem, 1.5vw, 0.58rem);
    font-weight: 800; letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--muted); padding: 0.2rem 0;
  }

  .cal-cell {
    text-align: center; padding: 0;
    font-size: clamp(0.6rem, 1.8vw, 0.8rem);
    font-weight: 700; color: var(--white);
    position: relative; aspect-ratio: unset;
    height: clamp(1.4rem, 4.5vw, 2rem);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }

  #greg-grid .cal-cell,
  #greg-grid .cal-day-header {
    font-family: Georgia, "Times New Roman", serif;
    color: var(--muted); font-weight: 700;
  }
  #greg-month-label {
    font-family: Georgia, "Times New Roman", serif;
    color: var(--muted); font-weight: 700;
  }
  #greg-grid .cal-cell.highlighted { color: var(--bg); }

  .cal-cell.empty { cursor: default; color: transparent; }
  .cal-cell.highlighted { color: var(--bg); }
  .cal-cell.highlighted::before {
    content: '';
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 70%; aspect-ratio: 1;
    background: var(--orange); border-radius: 4px; z-index: 0;
  }
  .cal-cell span { position: relative; z-index: 1; }

  .cal-farch-intercal {
    display: flex; padding: 0.3rem 0.25rem; gap: 0.2rem;
  }
  .cal-farch-intercal .cal-cell { flex: 1; aspect-ratio: 1; }

  .cal-farch-note {
    padding: 0.5rem 0.5rem 0.6rem;
    font-size: clamp(0.75rem, 2.2vw, 0.95rem);
    font-weight: 700; color: var(--orange);
    letter-spacing: 0.03em; text-align: left; line-height: 1.3;
  }

  /* ── Day arrows ───────────────────────────────────────────── */
  .day-nav-row { display: none; } /* removed — using combined row */

  /* ── Combined arrow row: ← month | ← day · day → | month → */
  .arrow-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0;
    margin-bottom: 0.1rem;
    width: 100%;
  }

  .arrow-spacer {
    flex: 1;
  }

  .month-nav-btn {
    width: 3.5rem; height: 3.5rem; padding: 0;
    font-size: 1.65rem; font-weight: 800;
    background: transparent; color: var(--muted);
    border: 1px solid var(--rule); border-radius: 8px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: color 0.15s, border-color 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .month-nav-btn:hover { color: var(--orange); border-color: var(--orange); }
  .month-nav-btn:active { transform: translateY(1px); }

  .day-nav-btn {
    width: 2.65rem; height: 2.65rem; padding: 0;
    font-size: 1.2rem; font-weight: 800;
    background: transparent; color: var(--muted);
    border: 1px solid var(--rule); border-radius: 6px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: color 0.15s, border-color 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .day-nav-btn:hover { color: var(--orange); border-color: var(--orange); }
  .day-nav-btn:active { transform: translateY(1px); }

  /* ── Month-jump arrows ────────────────────────────────────── */
  .month-nav-row { display: none; } /* removed — using combined row */

  /* ── Curtain animation groups ─────────────────────────────── */
  .anim-left, .anim-right { flex: 1; max-width: 48%; }

  #anim-converter,
  #anim-left,
  #anim-right,
  #anim-month-prev,
  #anim-month-next,
  #anim-day-prev,
  #anim-day-next,
  #anim-why-farch {
    transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                opacity 0.45s ease;
    will-change: transform, opacity;
  }

  /* Exit states */
  #anim-converter.exit-up     { transform: translateY(-130%); opacity: 0; }
  #anim-left.exit-left        { transform: translateX(-130%); opacity: 0; }
  #anim-right.exit-right      { transform: translateX(130%);  opacity: 0; }
  #anim-month-prev.exit-left  { transform: translateX(-130%); opacity: 0; }
  #anim-month-next.exit-right { transform: translateX(130%);  opacity: 0; }
  #anim-day-prev.exit-left    { transform: translateX(-130%); opacity: 0; }
  #anim-day-next.exit-right   { transform: translateX(130%);  opacity: 0; }
  #anim-why-farch.exit-down   { transform: translateY(130%);  opacity: 0; }

  /* ── Why Farch button ─────────────────────────────────────── */
  .why-farch-row {
    display: flex;
    justify-content: center;
    margin-top: 2.5rem;
  }

  .why-farch-btn {
    background: transparent;
    border: 1.5px solid var(--rule);
    border-radius: 8px;
    color: var(--orange);
    font-family: 'Nunito', sans-serif;
    font-size: 1.35rem;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 0.5rem 1.25rem;
    transition: opacity 0.2s, background 0.2s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  .why-farch-btn:hover { background: rgba(245,166,35,0.1); }

  /* Prevent text selection on all interactive elements */
  button {
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }

  * {
    touch-action: manipulation;
  }

  /* ── Presentation Overlay ─────────────────────────────────── */
  .pres-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }

  .pres-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }

  .pres-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem 1.25rem 1rem;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .pres-footer {
    padding: 0.75rem 1.25rem;
    padding-bottom: calc(0.75rem + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--rule);
  }

  .pres-back-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: 'Nunito', sans-serif;
    font-size: 0.8rem;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 0.25rem 0.5rem;
    transition: color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .pres-back-btn:hover { color: var(--white); }

  /* ── Chapter pie progress ─────────────────────────────────── */
  .pres-pie-wrap {
    width: 2.8rem;
    height: 2.8rem;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }

  .pres-pie-wrap svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  .pres-pie-slice {
    transition: opacity 0.4s ease;
    cursor: pointer;
  }

  /* ── Scene elements ───────────────────────────────────────── */
  .scene {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.25rem;
  }

  .scene-title {
    font-size: clamp(1.4rem, 5vw, 2rem);
    font-weight: 900;
    color: var(--white);
    text-align: center;
    line-height: 1.15;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 1.4s cubic-bezier(0.25, 0, 0.1, 1), transform 1.4s cubic-bezier(0.25, 0, 0.1, 1);
  }

  .scene-title.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .scene-body {
    font-size: clamp(0.9rem, 3vw, 1.1rem);
    font-weight: 600;
    color: var(--muted);
    text-align: center;
    line-height: 1.5;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 1.4s cubic-bezier(0.25, 0, 0.1, 1) 0.3s, transform 1.4s cubic-bezier(0.25, 0, 0.1, 1) 0.3s;
  }

  .scene-body.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .scene-highlight {
    color: var(--orange);
    font-weight: 900;
  }

  .scene-graphic {
    opacity: 0;
    transform: scale(0.94);
    transition: opacity 1.2s cubic-bezier(0.25, 0, 0.1, 1) 0.2s, transform 1.2s cubic-bezier(0.25, 0, 0.1, 1) 0.2s;
  }

  .scene-graphic.visible {
    opacity: 1;
    transform: scale(1);
  }

  .tap-hint {
    position: absolute;
    bottom: 1rem;
    right: 1.25rem;
    font-size: 0.6rem;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--rule);
    opacity: 0;
    transition: opacity 1s ease 1.5s;
  }
  .tap-hint.visible { opacity: 1; }
</style>
</head>
<body>
<div class="container">

  <!-- TOP: Converter box — stays fixed -->
  <div class="container-top">
    <!-- Conversion box -->
    <div class="converter" id="anim-converter">
    <div class="converter-col old">
      <div class="date-label cold">Old Date</div>
      <div class="old-date-display" id="old-date-display">—</div>
    </div>
    <div class="converter-col farch">
      <div class="date-label warm">Farch Date</div>
      <div class="farch-display" id="farch-display">—</div>
    </div>
  </div><!-- /.converter -->
  </div><!-- /.container-top -->

  <!-- MIDDLE: Calendars — grow and shrink here -->
  <div class="container-middle">

    <!-- Dual calendars -->
    <div class="cal-row">
    <div class="anim-left" id="anim-left">
      <div class="cal-box" id="greg-box">
        <div class="cal-month-label" id="greg-month-label"></div>
        <div class="cal-body" id="greg-body">
          <div class="cal-slide slide-active" id="greg-slide">
            <div class="cal-grid greg" id="greg-grid"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="anim-right" id="anim-right">
      <div class="cal-box" id="farch-box">
        <div class="cal-month-label" id="farch-month-label"></div>
        <div class="cal-body" id="farch-body">
          <div class="cal-slide slide-active" id="farch-slide">
            <div class="cal-grid farch-cal" id="farch-grid"></div>
            <div class="cal-farch-intercal" id="farch-intercal" style="display:none;"></div>
            <div class="cal-farch-note" id="cal-farch-note" style="display:none;">Farch is outside the regular calendar. No weekdays.</div>
          </div>
        </div>
      </div>
    </div>
  </div><!-- /.cal-row -->
  </div><!-- /.container-middle -->

  <!-- BOTTOM: Arrows and Why Farch — stays fixed -->
  <div class="container-bottom">

    <!-- Combined arrow row: ← month | ← day · day → | month → -->
    <div class="arrow-row">
      <div class="arrow-spacer"></div>
      <button class="month-nav-btn" id="anim-month-prev" onclick="stepMonth(-1)" aria-label="Previous month">&#8592;</button>
      <div class="arrow-spacer"></div>
      <button class="day-nav-btn"   id="anim-day-prev"   onclick="stepDate(-1)"  aria-label="Previous day">&#8592;</button>
      <div style="flex:0.5"></div>
      <button class="day-nav-btn"   id="anim-day-next"   onclick="stepDate(1)"   aria-label="Next day">&#8594;</button>
      <div class="arrow-spacer"></div>
      <button class="month-nav-btn" id="anim-month-next" onclick="stepMonth(1)"  aria-label="Next month">&#8594;</button>
      <div class="arrow-spacer"></div>
    </div>

    <!-- Why Farch entry point -->
    <div class="why-farch-row" id="anim-why-farch">
      <button class="why-farch-btn" onclick="openPresentation()">Why Farch?</button>
    </div>

  </div><!-- /.container-bottom -->

</div><!-- /.container -->

<!-- Presentation overlay -->
<div class="pres-overlay" id="pres-overlay">
  <div class="pres-screen" id="pres-screen">
    <!-- Scene content renders here -->
  </div>
  <div class="pres-footer">
    <button class="pres-back-btn" onclick="closePresentation()">&#8592; Back</button>
    <div class="pres-pie-wrap" id="pres-pie-wrap">
      <svg id="pres-pie-svg" viewBox="0 0 44 44"></svg>
    </div>
  </div>
</div>

<script>
  const GREG_DAYS   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const FARCH_DAYS  = ["Sun","Mon","Wed","Thu","Fri","Sat"];
  const GREG_MONTHS = ["January","February","March","April","May","June",
                       "July","August","September","October","November","December"];
  const FARCH_MONTHS = ["","January","February","March","April","May","June",
                        "July","August","September","October","November","December"];

  function isLeapYear(y) {
    return (y % 4 === 0 && y % 100 !== 0) || (y % 400 === 0);
  }

  function gregorianToFarch(gDate) {
    const year = gDate.getUTCFullYear();
    const dec22 = new Date(Date.UTC(year, 11, 22));
    let farchYear, farchYearStart;
    if (gDate >= dec22) {
      farchYear = year + 1;
      farchYearStart = dec22;
    } else {
      farchYear = year;
      farchYearStart = new Date(Date.UTC(year - 1, 11, 22));
    }
    const dayOfYear = Math.round((gDate - farchYearStart) / 86400000) + 1;
    if (dayOfYear <= 360) {
      const farchMonth = Math.ceil(dayOfYear / 30);
      const farchDay = ((dayOfYear - 1) % 30) + 1;
      const dayName = FARCH_DAYS[(farchDay - 1) % 6];
      return {
        year: farchYear, month: farchMonth,
        monthName: FARCH_MONTHS[farchMonth],
        day: farchDay, dayName, isFarch: false,
        formatted: `${dayName}, ${FARCH_MONTHS[farchMonth]} ${farchDay}, ${farchYear}`
      };
    } else {
      const farchDay = dayOfYear - 360;
      const maxFarch = isLeapYear(farchYear) ? 6 : 5;
      if (farchDay > maxFarch) return { error: true };
      return {
        year: farchYear, month: 13, monthName: "Farch",
        day: farchDay, dayName: null, isFarch: true,
        formatted: `Farch ${farchDay}, ${farchYear}`
      };
    }
  }

  function farchToGregorian(farchYear, farchMonth, farchDay) {
    const farchYearStart = new Date(Date.UTC(farchYear - 1, 11, 22));
    const dayOfYear = farchMonth <= 12
      ? (farchMonth - 1) * 30 + farchDay
      : 360 + farchDay;
    return new Date(farchYearStart.getTime() + (dayOfYear - 1) * 86400000);
  }

  let currentDate = null;

  // Track previous month IDs to detect month changes
  let prevGregMonthId  = null;
  let prevFarchMonthId = null;

  function monthId(y, m)  { return `${y}-${m}`; }
  function gregMonthId(d) { return monthId(d.getUTCFullYear(), d.getUTCMonth()); }
  function farchMonthId(r){ return r ? monthId(r.year, r.month) : null; }

  // ── Slide animation ──────────────────────────────────────────
  function slideCalendar(bodyEl, slideEl, direction, renderFn) {
    const outClass = direction > 0 ? 'slide-out-left'  : 'slide-out-right';
    const inClass  = direction > 0 ? 'slide-in-left'   : 'slide-in-right';

    // Clean up any orphaned slides from a previous rapid animation
    bodyEl.querySelectorAll('.cal-slide:not(.slide-active)').forEach(el => el.remove());

    // Measure current height and lock it
    const oldHeight = slideEl.offsetHeight;
    bodyEl.style.height = oldHeight + 'px';

    // Create new slide off-screen and render into it
    const newSlide = document.createElement('div');
    newSlide.className = `cal-slide ${inClass}`;
    newSlide.style.visibility = 'hidden';
    bodyEl.appendChild(newSlide);
    renderFn(newSlide);

    // Measure new height
    const newHeight = newSlide.offsetHeight;
    newSlide.style.visibility = '';

    // Start slide animation and height tween simultaneously
    requestAnimationFrame(() => {
      bodyEl.style.height = newHeight + 'px';

      slideEl.classList.remove('slide-active');
      slideEl.classList.add(outClass);
      newSlide.classList.remove(inClass);
      newSlide.classList.add('slide-active');

      setTimeout(() => {
        slideEl.remove();
        bodyEl.style.height = '';
      }, 300);
    });

    return newSlide;
  }

  // Return icon key if this Greg date is a holiday, else null
  function gregHoliday(y, m, d) {
    // m is 0-based
    if (m === 9  && d === 31) return 'halloween';   // Oct 31
    if (m === 11 && d === 25) return 'christmas';   // Dec 25
    if (m === 11 && d === 31) return 'newyears';    // Dec 31
    // Thanksgiving: 4th Thursday in November
    if (m === 10) {
      let thursdays = 0;
      for (let day = 1; day <= d; day++) {
        if (new Date(Date.UTC(y, 10, day)).getUTCDay() === 4) thursdays++;
      }
      if (thursdays === 4 && new Date(Date.UTC(y, 10, d)).getUTCDay() === 4) return 'turkey';
    }
    return null;
  }

  // Return icon key if this Farch date is a holiday, else null
  function farchHoliday(farchMonth, farchDay, farchYear) {
    if (farchMonth === 10 && farchDay === 30) return 'halloween';  // Oct 30
    if (farchMonth === 11 && farchDay === 22) return 'turkey';     // Nov 22
    if (farchMonth === 12 && farchDay === 25) return 'christmas';  // Dec 25
    if (farchMonth === 13) {
      const maxFarch = isLeapYear(farchYear) ? 6 : 5;
      if (farchDay === maxFarch) return 'newyears';                // Last day of Farch
    }
    return null;
  }

  function holidayImg(key) {
    return `<span><img src="${HOLIDAY_ICONS[key]}" style="width:85%;height:85%;object-fit:contain;display:block;margin:auto;" alt="${key}"></span>`;
  }

  // ── Render Greg calendar into a container ───────────────────
  function buildGregContent(container, y, m, highlightDay) {
    const grid = document.createElement('div');
    grid.className = 'cal-grid greg';
    grid.id = 'greg-grid';

    GREG_DAYS.forEach(d => {
      const h = document.createElement('div');
      h.className = 'cal-day-header';
      h.textContent = d;
      grid.appendChild(h);
    });

    const firstDow = new Date(Date.UTC(y, m, 1)).getUTCDay();
    for (let i = 0; i < firstDow; i++) {
      const e = document.createElement('div');
      e.className = 'cal-cell empty';
      e.innerHTML = '<span></span>';
      grid.appendChild(e);
    }

    const daysInMonth = new Date(Date.UTC(y, m + 1, 0)).getUTCDate();
    for (let d = 1; d <= daysInMonth; d++) {
      const cell = document.createElement('div');
      const isHighlighted = d === highlightDay;
      cell.className = 'cal-cell' + (isHighlighted ? ' highlighted' : '');
      const icon = gregHoliday(y, m, d);
      cell.innerHTML = icon ? holidayImg(icon) : `<span>${d}</span>`;
      const day = d;
      cell.addEventListener('click', () => setDate(new Date(Date.UTC(y, m, day))));
      grid.appendChild(cell);
    }

    container.appendChild(grid);
  }

  let farchNoteShown = false;

  // ── Render Farch calendar into a container ──────────────────
  function buildFarchContent(container, result) {
    if (!result || result.error) return;
    const farchYear = result.year;

    if (result.isFarch) {
      const intercal = document.createElement('div');
      intercal.className = 'cal-farch-intercal';
      intercal.id = 'farch-intercal';
      const maxDays = isLeapYear(farchYear) ? 6 : 5;
      for (let i = 1; i <= maxDays; i++) {
        const cell = document.createElement('div');
        const isHighlighted = i === result.day;
        cell.className = 'cal-cell' + (isHighlighted ? ' highlighted' : '');
        const icon = farchHoliday(13, i, farchYear);
        if (icon) {
          cell.innerHTML = holidayImg(icon);
        } else {
          cell.innerHTML = `<span style="${!isHighlighted ? 'color:var(--orange)' : ''}">${i}</span>`;
        }
        const dayNum = i;
        cell.addEventListener('click', () => setDate(farchToGregorian(farchYear, 13, dayNum)));
        intercal.appendChild(cell);
      }
      container.appendChild(intercal);

      if (!farchNoteShown) {
        const note = document.createElement('div');
        note.className = 'cal-farch-note';
        note.id = 'cal-farch-note';
        note.textContent = 'Farch is outside the regular calendar. No weekdays.';
        container.appendChild(note);
        farchNoteShown = true;
      }
    } else {
      const grid = document.createElement('div');
      grid.className = 'cal-grid farch-cal';
      grid.id = 'farch-grid';

      FARCH_DAYS.forEach(d => {
        const h = document.createElement('div');
        h.className = 'cal-day-header';
        h.textContent = d;
        grid.appendChild(h);
      });

      const fMonth = result.month;
      for (let d = 1; d <= 30; d++) {
        const cell = document.createElement('div');
        const isHighlighted = d === result.day;
        cell.className = 'cal-cell' + (isHighlighted ? ' highlighted' : '');
        const icon = farchHoliday(fMonth, d, farchYear);
        cell.innerHTML = icon ? holidayImg(icon) : `<span>${d}</span>`;
        const dayNum = d;
        cell.addEventListener('click', () => setDate(farchToGregorian(farchYear, fMonth, dayNum)));
        grid.appendChild(cell);
      }
      container.appendChild(grid);
    }
  }

  // ── Main render ─────────────────────────────────────────────
  function updateDisplay(direction) {
    const d = currentDate;
    const result = gregorianToFarch(d);

    // Update conversion box
    const dispEl = document.getElementById('farch-display');
    if (!result || result.error) {
      dispEl.textContent = "—";
    } else if (result.isFarch) {
      dispEl.innerHTML = `Farch ${result.day}<br><span style="color:var(--white)">${result.year}</span>`;
      dispEl.className = 'farch-display is-farch-period';
    } else {
      dispEl.innerHTML = `<span class="day-name">${result.dayName}</span>, ${result.monthName.slice(0,3)} ${result.day}<br>${result.year}`;
      dispEl.className = 'farch-display';
    }

    // Check if month changed
    const newGregId  = gregMonthId(d);
    const newFarchId = farchMonthId(result);
    const gregChanged  = prevGregMonthId  !== null && newGregId  !== prevGregMonthId;
    const farchChanged = prevFarchMonthId !== null && newFarchId !== prevFarchMonthId;

    // Update Gregorian calendar
    const gregMonthLabel = document.getElementById('greg-month-label');
    gregMonthLabel.textContent = `${GREG_MONTHS[d.getUTCMonth()].slice(0,3)} ${d.getUTCFullYear()}`;

    const gregBody = document.getElementById('greg-body');
    let gregSlide  = gregBody.querySelector('.cal-slide.slide-active');

    if (gregChanged && direction !== 0) {
      gregSlide = slideCalendar(gregBody, gregSlide, direction, (container) => {
        buildGregContent(container, d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate());
      });
    } else {
      gregSlide.innerHTML = '';
      buildGregContent(gregSlide, d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate());
    }

    // Update Farch calendar
    const farchMonthLabel = document.getElementById('farch-month-label');
    if (result && !result.error) {
      if (result.isFarch) {
        farchMonthLabel.innerHTML = `<span style="color:var(--orange)">Farch</span> ${result.year}`;
      } else {
        farchMonthLabel.textContent = `${result.monthName.slice(0,3)} ${result.year}`;
      }
    }

    const farchBody = document.getElementById('farch-body');
    let farchSlide  = farchBody.querySelector('.cal-slide.slide-active');

    if (farchChanged && direction !== 0) {
      farchSlide = slideCalendar(farchBody, farchSlide, direction, (container) => {
        buildFarchContent(container, result);
      });
    } else {
      farchSlide.innerHTML = '';
      buildFarchContent(farchSlide, result);
    }

    prevGregMonthId  = newGregId;
    prevFarchMonthId = newFarchId;
  }

  function setDate(d, direction) {
    currentDate = d;
    const y   = d.getUTCFullYear();
    const dayNames   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    document.getElementById('old-date-display').innerHTML =
      `${dayNames[d.getUTCDay()]}, ${monthNames[d.getUTCMonth()]} ${d.getUTCDate()}<br>${y}`;
    updateDisplay(direction ?? 0);
  }

  function stepDate(delta) {
    if (!currentDate) return;
    setDate(new Date(currentDate.getTime() + delta * 86400000), delta);
  }

  // ── Month jump ───────────────────────────────────────────────
  function stepMonth(delta) {
    if (!currentDate) return;

    const result = gregorianToFarch(currentDate);
    if (!result || result.error) return;

    const currentFarchDay = result.day;

    // Target: same Farch day number, 30 days forward/back in Farch
    let targetFarchMonth, targetFarchYear, targetFarchDay;

    if (result.isFarch) {
      // Currently in Farch intercalary
      if (delta > 0) {
        // Jump to Farch January of next year, same day (capped at 30)
        targetFarchYear  = result.year + 1;
        targetFarchMonth = 1;
        targetFarchDay   = Math.min(currentFarchDay, 30);
      } else {
        // Jump to Farch December of same year, same day (capped at 30)
        targetFarchYear  = result.year;
        targetFarchMonth = 12;
        targetFarchDay   = Math.min(currentFarchDay, 30);
      }
    } else {
      const newMonth = result.month + delta;
      if (newMonth < 1) {
        // Crossing back into Farch of previous year
        targetFarchYear  = result.year - 1;
        targetFarchMonth = 13;
        const maxFarch = isLeapYear(targetFarchYear) ? 6 : 5;
        targetFarchDay = Math.min(currentFarchDay, maxFarch);
      } else if (newMonth > 12) {
        // Crossing forward into Farch
        targetFarchYear  = result.year;
        targetFarchMonth = 13;
        const maxFarch = isLeapYear(targetFarchYear) ? 6 : 5;
        targetFarchDay = Math.min(currentFarchDay, maxFarch);
      } else {
        targetFarchYear  = result.year;
        targetFarchMonth = newMonth;
        targetFarchDay   = currentFarchDay;
      }
    }

    const newGreg = farchToGregorian(targetFarchYear, targetFarchMonth, targetFarchDay);
    setDate(newGreg, delta);
  }

  // ── Presentation Engine ──────────────────────────────────────

  // Each chapter is an array of beats. Each beat is a function
  // that receives the scene container and renders into it.
  const CHAPTERS = [

    // Chapter 1: Bad Numbers
    [
      (scene) => {
        scene.innerHTML = `

            <svg width="140" height="140" viewBox="0 0 140 140">
              ${buildPieSlices(7, [], '#3a9fd5', '#1f5480')}
            </svg>

        `;

      },

        `;

      (scene) => {

    [

        `;

    // Chapter 6: The Egyptians
    [
      (scene) => {

      },

        scene.innerHTML = `
          <div class="scene-title">We are extraordinarily lucky.</div>
          <div class="scene-body">Earth spins almost exactly 365 times per orbit — close enough to 360 to make this work.<br><br>Mars spins <span class="scene-highlight">669</span> times per orbit. A terrible number. Another reason Mars would be awful.</div>
        `;

    // Chapter 7: The Calendar
    [
      (scene) => {
        scene.innerHTML = `
          <div class="scene-title">Every month starts on <span class="scene-highlight">Sunday</span>.</div>
          <div class="scene-body">Without exception. Which means every date always falls on the same weekday, every year, forever.</div>
        `;
        animate(scene);
      },
      (scene) => {
        scene.innerHTML = `
          <div class="scene-title">Holidays lock into place.</div>
          <div class="scene-body">Thanksgiving is always <span class="scene-highlight">November 22nd</span>.<br>Halloween is always <span class="scene-highlight">October 30th</span> — always a Saturday.<br>Christmas is always a <span class="scene-highlight">Sunday</span>.</div>
        `;
        animate(scene);
      },

    // Chapter 8: Beautiful Dead End
    [
      (scene) => {

        `;
        animate(scene);
      },
      (scene) => {
        scene.innerHTML = `
          <div class="scene-title">And yet.</div>
          <div class="scene-body">There is something deeply human about looking at a broken inherited system and saying:<br><br><span class="scene-highlight">I know what this should look like.</span><br><br>Even if no one listens. Even if the pope says nope.</div>
        `;
        animate(scene);
      },
      (scene) => {
        scene.innerHTML = `
          <div class="scene-title">The year ends on the longest night.</div>
          <div class="scene-body">Then five quiet days of Farch.<br><br>Then the world begins again.</div>
        `;
        animate(scene);
      },
    ],

  ];

  const TOTAL_CHAPTERS = CHAPTERS.length;
  let currentChapter = 0;
  let currentBeat    = 0;

  function animate(scene) {
    requestAnimationFrame(() => {
      scene.querySelectorAll('.scene-title, .scene-body, .scene-graphic').forEach(el => {
        requestAnimationFrame(() => el.classList.add('visible'));
      });
      const hint = scene.querySelector('.tap-hint');
      if (hint) hint.classList.add('visible');
    });
  }

  function renderBeat() {
    const screen = document.getElementById('pres-screen');
    screen.innerHTML = '<div class="scene" id="current-scene"></div><div class="tap-hint">tap to continue</div>';
    const scene = document.getElementById('current-scene');
    CHAPTERS[currentChapter][currentBeat](scene);
    drawProgressPie();
  }

  function advanceBeat() {
    const chapter = CHAPTERS[currentChapter];
    if (currentBeat < chapter.length - 1) {
      currentBeat++;
    } else if (currentChapter < TOTAL_CHAPTERS - 1) {
      currentChapter++;
      currentBeat = 0;
    } else {
      // End of presentation
      closePresentation();
      return;
    }
    renderBeat();
  }

  function drawProgressPie() {
    const svg = document.getElementById('pres-pie-svg');
    const wrap = document.getElementById('pres-pie-wrap');
    if (!svg || !wrap) return;
    svg.innerHTML = '';

    const cx = 22, cy = 22, r = 18;
    const completedChapters = currentChapter;

    if (completedChapters === 0) {
      wrap.style.pointerEvents = 'none';
      return;
    }

    wrap.style.pointerEvents = 'auto';

    // Ghost circle
    const ghost = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    ghost.setAttribute('cx', cx); ghost.setAttribute('cy', cy); ghost.setAttribute('r', r);
    ghost.setAttribute('fill', 'none');
    ghost.setAttribute('stroke', '#2a6090');
    ghost.setAttribute('stroke-width', '1');
    svg.appendChild(ghost);

    const angleStep = (2 * Math.PI) / TOTAL_CHAPTERS;

    for (let i = 0; i < completedChapters; i++) {
      const startAngle = i * angleStep - Math.PI / 2;
      const endAngle   = startAngle + angleStep;
      const x1 = cx + r * Math.cos(startAngle);
      const y1 = cy + r * Math.sin(startAngle);
      const x2 = cx + r * Math.cos(endAngle);
      const y2 = cy + r * Math.sin(endAngle);
      const largeArc = angleStep > Math.PI ? 1 : 0;

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', `M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${largeArc} 1 ${x2},${y2} Z`);
      path.setAttribute('fill', '#f5a623');
      path.setAttribute('stroke', '#1a4a6e');
      path.setAttribute('stroke-width', '1');
      svg.appendChild(path);
    }
  }

  function pieGoBack(e) {
    e.stopPropagation();
    if (currentChapter > 0) {
      currentChapter--;
      currentBeat = 0;
      renderBeat();
    }
  }

  function openPresentation() {
    currentChapter = 0;
    currentBeat    = 0;

    const whyEl   = document.getElementById('anim-why-farch');
    const convEl  = document.getElementById('anim-converter');
    const leftEl  = document.getElementById('anim-left');
    const rightEl = document.getElementById('anim-right');
    const mPrev   = document.getElementById('anim-month-prev');
    const mNext   = document.getElementById('anim-month-next');
    const dPrev   = document.getElementById('anim-day-prev');
    const dNext   = document.getElementById('anim-day-next');

    whyEl.classList.add('exit-down');

    setTimeout(() => {
      convEl.classList.add('exit-up');
      leftEl.classList.add('exit-left');
      rightEl.classList.add('exit-right');
      mPrev.classList.add('exit-left');
      mNext.classList.add('exit-right');
      dPrev.classList.add('exit-left');
      dNext.classList.add('exit-right');
    }, 80);

    setTimeout(() => {
      const overlay = document.getElementById('pres-overlay');
      overlay.style.transition = 'none';
      overlay.style.transform  = 'none';
      overlay.style.opacity    = '0';
      overlay.classList.add('open');
      requestAnimationFrame(() => {
        overlay.style.transition = 'opacity 0.3s ease';
        overlay.style.opacity    = '1';
      });
      renderBeat();
      document.getElementById('pres-screen').addEventListener('click', advanceBeat);
      document.getElementById('pres-pie-wrap').addEventListener('click', pieGoBack);
    }, 520);
  }

  function closePresentation() {
    const overlay = document.getElementById('pres-overlay');
    overlay.style.transition = 'opacity 0.3s ease';
    overlay.style.opacity    = '0';

    setTimeout(() => {
      overlay.classList.remove('open');
      overlay.style.transition = '';
      overlay.style.transform  = '';
      overlay.style.opacity    = '';

      const convEl  = document.getElementById('anim-converter');
      const leftEl  = document.getElementById('anim-left');
      const rightEl = document.getElementById('anim-right');
      const mPrev   = document.getElementById('anim-month-prev');
      const mNext   = document.getElementById('anim-month-next');
      const dPrev   = document.getElementById('anim-day-prev');
      const dNext   = document.getElementById('anim-day-next');
      const whyEl   = document.getElementById('anim-why-farch');

      leftEl.classList.remove('exit-left');
      rightEl.classList.remove('exit-right');
      mPrev.classList.remove('exit-left');
      mNext.classList.remove('exit-right');
      dPrev.classList.remove('exit-left');
      dNext.classList.remove('exit-right');

      setTimeout(() => { convEl.classList.remove('exit-up'); }, 80);
      setTimeout(() => { whyEl.classList.remove('exit-down'); }, 160);

    }, 300);
  }

  // ── Interactive 360 wheel ────────────────────────────────────
  const DIVISIONS = [2, 3, 4, 5, 6, 8, 9, 10, 12, 15, 18, 20, 24, 30, 36, 40, 45, 60, 72, 90, 120, 180, 360];
  let divIndex = 0;

  function buildInteractive360() {
    return `
      <div class="scene-graphic" style="display:flex;flex-direction:column;align-items:center;gap:0.75rem;">
        <svg id="div360-svg" width="160" height="160" viewBox="0 0 160 160"></svg>
        <div style="display:flex;gap:0.5rem;align-items:center;">
          <button class="nav-btn" onclick="event.stopPropagation();stepDivision(-1)" style="width:2rem;height:2rem;font-size:1rem;">&#8592;</button>
          <div id="div360-label" style="font-size:1.1rem;font-weight:900;color:var(--orange);min-width:5rem;text-align:center;"></div>
          <button class="nav-btn" onclick="event.stopPropagation();stepDivision(1)" style="width:2rem;height:2rem;font-size:1rem;">&#8594;</button>
        </div>
      </div>
      <div class="scene-body">360 divides evenly by <span class="scene-highlight">24 different numbers</span>. Try them all.</div>
    `;
  }

  function initInteractive360(scene) {
    divIndex = 3; // start at ÷5
    drawDivision();
  }

  function stepDivision(delta) {
    divIndex = (divIndex + delta + DIVISIONS.length) % DIVISIONS.length;
    drawDivision();
  }

  function drawDivision() {
    const svg = document.getElementById('div360-svg');
    const label = document.getElementById('div360-label');
    if (!svg || !label) return;
    const n = DIVISIONS[divIndex];
    label.textContent = `÷ ${n} = ${360/n}°`;
    svg.innerHTML = buildPieSlices(n, Array.from({length:n},(_,i)=>i), '#f5a623', '#1f5480', 76, 80, 80);
  }

  function buildPieSlices(n, filledIndices, fillColor, emptyColor, r=60, cx=70, cy=70) {
    const slices = [];
    const angleStep = (2 * Math.PI) / n;
    for (let i = 0; i < n; i++) {
      const startAngle = i * angleStep - Math.PI / 2;
      const endAngle   = startAngle + angleStep;
      const x1 = cx + r * Math.cos(startAngle);
      const y1 = cy + r * Math.sin(startAngle);
      const x2 = cx + r * Math.cos(endAngle);
      const y2 = cy + r * Math.sin(endAngle);
      const largeArc = angleStep > Math.PI ? 1 : 0;
      const fill = filledIndices.includes(i) ? fillColor : emptyColor;
      slices.push(`<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${largeArc} 1 ${x2},${y2} Z" fill="${fill}" stroke="#1a4a6e" stroke-width="1.5"/>`);
    }
    // Outer circle stroke
    slices.push(`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#93bcd8" stroke-width="1.5" opacity="0.4"/>`);
    return slices.join('');
  }
  document.addEventListener('DOMContentLoaded', () => {
    const now   = new Date();
    const today = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));

    const convEl  = document.getElementById('anim-converter');
    const leftEl  = document.getElementById('anim-left');
    const rightEl = document.getElementById('anim-right');
    const mPrev   = document.getElementById('anim-month-prev');
    const mNext   = document.getElementById('anim-month-next');
    const dPrev   = document.getElementById('anim-day-prev');
    const dNext   = document.getElementById('anim-day-next');
    const whyEl   = document.getElementById('anim-why-farch');

    const allEls = [convEl, leftEl, rightEl, mPrev, mNext, dPrev, dNext, whyEl];

    allEls.forEach(el => { el.style.transition = 'none'; });

    convEl.classList.add('exit-up');
    leftEl.classList.add('exit-left');
    rightEl.classList.add('exit-right');
    mPrev.classList.add('exit-left');
    mNext.classList.add('exit-right');
    dPrev.classList.add('exit-left');
    dNext.classList.add('exit-right');
    whyEl.classList.add('exit-down');

    setDate(today, 0);

    requestAnimationFrame(() => {
      allEls.forEach(el => { el.style.transition = ''; });

      setTimeout(() => {
        leftEl.classList.remove('exit-left');
        rightEl.classList.remove('exit-right');
        mPrev.classList.remove('exit-left');
        mNext.classList.remove('exit-right');
        dPrev.classList.remove('exit-left');
        dNext.classList.remove('exit-right');
      }, 100);

      setTimeout(() => { convEl.classList.remove('exit-up'); }, 220);
      setTimeout(() => { whyEl.classList.remove('exit-down'); }, 340);
    });

    // Prevent all zoom — double-tap, pinch, and gesture
    // Prevent double-tap zoom — skip buttons so rapid tapping works freely
    let lastTap = 0;
    document.addEventListener('touchend', e => {
      if (e.target.closest('button')) return; // buttons never trigger zoom
      const now = Date.now();
      if (now - lastTap < 300) e.preventDefault();
      lastTap = now;
    }, { passive: false });

    document.addEventListener('touchstart', e => {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });

    document.addEventListener('gesturestart',  e => e.preventDefault(), { passive: false });
    document.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });
    document.addEventListener('gestureend',    e => e.preventDefault(), { passive: false });
    document.addEventListener('touchmove', e => {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });
  });
</script>
</body>
</html>
