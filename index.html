<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
<title>Farch Date Converter</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&family=Work+Sans:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a4a6e;
    --surface: #1f5480;
    --orange: #f5a623;
    --orange-dark: #d4891a;
    --white: #ffffff;
    --muted: #93bcd8;
    --rule: #2a6090;
    --header-bg: #163858;
    --farch-gold-bg: rgba(245,166,35,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
  }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Nunito', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 0.5rem 0.75rem;
    padding-bottom: calc(0.5rem + env(safe-area-inset-bottom));
  }

  .container {
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    max-height: 100dvh;
  }

  .container-top {
    flex-shrink: 0;
    margin-bottom: 0.5rem;
  }

  .container-middle {
    flex-shrink: 0;
  }

  .container-bottom {
    flex-shrink: 0;
    margin-top: 0.5rem;
  }

  /* ── Conversion Box ───────────────────────────────────────── */
  .converter {
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--rule);
    margin-bottom: 0.75rem;
    display: flex;
  }

  .converter-col { flex: 1; padding: clamp(0.5rem, 2vw, 0.85rem); }
  .converter-col.old { border-right: 1px solid var(--rule); }

  .date-label {
    font-size: 0.65rem;
    font-weight: 800;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }
  .date-label.cold { color: var(--muted); }
  .date-label.warm { color: var(--orange); }

  .old-date-display {
    font-family: Georgia, "Times New Roman", serif;
    font-size: clamp(1.1rem, 4.5vw, 1.8rem);
    font-weight: 700; line-height: 1.25;
    color: var(--muted); word-break: break-word;
  }

  .farch-display {
    font-size: clamp(1.1rem, 4.5vw, 1.8rem);
    font-weight: 900; line-height: 1.25;
    color: var(--white); word-break: break-word;
  }
  .farch-display .day-name { color: var(--orange); }
  .farch-display.is-farch-period { color: var(--orange); }

  /* ── Dual Calendars ───────────────────────────────────────── */
  .cal-row {
    display: flex; gap: 0.75rem;
    justify-content: center; align-items: flex-start;
    min-height: clamp(11rem, 32dvh, 14rem);
  }

  .cal-box {
    flex: 1; background: var(--surface);
    border-radius: 8px; border: 1px solid var(--rule);
    overflow: hidden; width: 100%;
  }

  /* Slide animation container */
  .cal-body {
    position: relative;
    overflow: hidden;
    transition: height 0.28s ease;
  }

  .cal-slide {
    width: 100%;
    transition: transform 0.28s ease, opacity 0.28s ease;
  }

  .cal-slide.slide-out-left  { transform: translateX(-100%); opacity: 0; position: absolute; top: 0; left: 0; width: 100%; }
  .cal-slide.slide-out-right { transform: translateX(100%);  opacity: 0; position: absolute; top: 0; left: 0; width: 100%; }
  .cal-slide.slide-in-left   { transform: translateX(100%);  opacity: 0; }
  .cal-slide.slide-in-right  { transform: translateX(-100%); opacity: 0; }
  .cal-slide.slide-active    { transform: translateX(0);      opacity: 1; }

  .cal-month-label {
    background: var(--header-bg);
    text-align: center;
    font-size: clamp(0.65rem, 2vw, 0.85rem);
    font-weight: 800; color: var(--white);
    padding: 0.2rem 0.25rem 0.3rem;
  }

  .cal-grid { display: grid; }
  .cal-grid.greg      { grid-template-columns: repeat(7, 1fr); }
  .cal-grid.farch-cal { grid-template-columns: repeat(6, 1fr); }

  .cal-day-header {
    background: var(--header-bg);
    text-align: center;
    font-size: clamp(0.45rem, 1.5vw, 0.58rem);
    font-weight: 800; letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--muted); padding: 0.2rem 0;
  }

  .cal-cell {
    text-align: center; padding: 0;
    font-size: clamp(0.6rem, 1.8vw, 0.8rem);
    font-weight: 700; color: var(--white);
    position: relative; aspect-ratio: unset;
    height: clamp(1.4rem, 4.5vw, 2rem);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }

  #greg-grid .cal-cell,
  #greg-grid .cal-day-header {
    font-family: Georgia, "Times New Roman", serif;
    color: var(--muted); font-weight: 700;
  }
  #greg-month-label {
    font-family: Georgia, "Times New Roman", serif;
    color: var(--muted); font-weight: 700;
  }
  #greg-grid .cal-cell.highlighted { color: var(--bg); }

  .cal-cell.empty { cursor: default; color: transparent; }
  .cal-cell.highlighted { color: var(--bg); }
  .cal-cell.highlighted::before {
    content: '';
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 70%; aspect-ratio: 1;
    background: var(--orange); border-radius: 4px; z-index: 0;
  }
  .cal-cell span { position: relative; z-index: 1; }
  .cal-cell .holiday-icon { width: 85%; height: 85%; object-fit: contain; display: block; margin: auto; transition: width 0.15s, height 0.15s; }
  .cal-cell.highlighted .holiday-icon { width: 62%; height: 62%; }

  .cal-farch-intercal {
    display: flex; padding: 0.3rem 0.25rem; gap: 0.2rem;
  }
  .cal-farch-intercal .cal-cell { flex: 1; aspect-ratio: 1; min-width: 0; }
  .cal-farch-intercal .holiday-icon { width: 70%; height: 70%; }
  .cal-farch-intercal .cal-cell.highlighted .holiday-icon { width: 55%; height: 55%; }

  .cal-farch-note {
    padding: 0.5rem 0.5rem 0.6rem;
    font-size: clamp(0.75rem, 2.2vw, 0.95rem);
    font-weight: 700; color: var(--orange);
    letter-spacing: 0.03em; text-align: left; line-height: 1.3;
  }

  /* ── Day arrows ───────────────────────────────────────────── */
  .day-nav-row { display: none; } /* removed — using combined row */

  /* ── Combined arrow row: ← month | ← day · day → | month → */
  .arrow-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0;
    margin-bottom: 0.1rem;
    width: 100%;
  }

  .arrow-spacer {
    flex: 1;
  }

  .month-nav-btn {
    width: 3.5rem; height: 3.5rem; padding: 0;
    font-size: 1.65rem; font-weight: 800;
    background: transparent; color: var(--muted);
    border: 1px solid var(--rule); border-radius: 8px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: color 0.15s, border-color 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .month-nav-btn:hover { color: var(--orange); border-color: var(--orange); }
  .month-nav-btn:active { transform: translateY(1px); }

  .day-nav-btn {
    width: 2.65rem; height: 2.65rem; padding: 0;
    font-size: 1.2rem; font-weight: 800;
    background: transparent; color: var(--muted);
    border: 1px solid var(--rule); border-radius: 6px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: color 0.15s, border-color 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .day-nav-btn:hover { color: var(--orange); border-color: var(--orange); }
  .day-nav-btn:active { transform: translateY(1px); }

  /* ── Month-jump arrows ────────────────────────────────────── */
  .month-nav-row { display: none; } /* removed — using combined row */

  /* ── Curtain animation groups ─────────────────────────────── */
  .anim-left, .anim-right { flex: 1; max-width: 48%; }

  #anim-converter {
    transition: transform 0.9s cubic-bezier(0.4, 0, 0.2, 1),
                opacity 0.9s ease;
    will-change: transform, opacity;
  }

  #anim-left,
  #anim-right,
  #anim-month-prev,
  #anim-month-next,
  #anim-day-prev,
  #anim-day-next,
  #anim-why-farch,
  #share-btn {
    transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                opacity 0.45s ease;
    will-change: transform, opacity;
  }

  /* Exit states */
  #anim-converter.exit-up     { transform: translateY(-130%); opacity: 0; }
  #anim-left.exit-left        { transform: translateX(-130%); opacity: 0; }
  #anim-right.exit-right      { transform: translateX(130%);  opacity: 0; }
  #anim-month-prev.exit-left  { transform: translateX(-130%); opacity: 0; }
  #anim-month-next.exit-right { transform: translateX(130%);  opacity: 0; }
  #anim-day-prev.exit-left    { transform: translateX(-130%); opacity: 0; }
  #anim-day-next.exit-right   { transform: translateX(130%);  opacity: 0; }
  #anim-why-farch.exit-down   { transform: translateY(130%);  opacity: 0; }
  #share-btn.exit-down        { transform: translateY(130%);  opacity: 0; }

  /* ── Why Farch button ─────────────────────────────────────── */
  .why-farch-row {
    display: flex;
    justify-content: center;
    margin-top: 2.5rem;
  }

  .why-farch-btn {
    background: transparent;
    border: 1.5px solid var(--rule);
    border-radius: 8px;
    color: var(--orange);
    font-family: 'Nunito', sans-serif;
    font-size: 1.35rem;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 0.5rem 1.25rem;
    transition: opacity 0.2s, background 0.2s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  .why-farch-btn:hover { background: rgba(245,166,35,0.1); }

  @keyframes bdShake {
    0%,100% { transform: translateX(0) rotate(0deg); }
    10%      { transform: translateX(-5px) rotate(-1.2deg); }
    20%      { transform: translateX(5px) rotate(1.2deg); }
    30%      { transform: translateX(-4px) rotate(-0.8deg); }
    40%      { transform: translateX(4px) rotate(0.8deg); }
    50%      { transform: translateX(-3px) rotate(-0.5deg); }
    60%      { transform: translateX(3px) rotate(0.5deg); }
    70%      { transform: translateX(-2px) rotate(-0.3deg); }
    80%      { transform: translateX(2px) rotate(0.3deg); }
    90%      { transform: translateX(-1px) rotate(-0.1deg); }
  }
  .bd-shake {
    animation: bdShake 0.7s cubic-bezier(0.36,0.07,0.19,0.97) infinite;
  }

  /* Prevent text selection on all interactive elements */
  button {
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }

  /* ── Presentation Overlay ─────────────────────────────────── */
  .pres-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }

  .pres-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }

  .pres-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem 1.25rem 0;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  /* Graphic zone: fills available space, anchors content to center vertically */
  .scene {
    flex: 1;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    position: relative;
  }

  /* Title-only beats anchor from a fixed vertical position so adding a second
     title element doesn't shift the first one */
  .scene.scene-text-only {
    justify-content: flex-start;
    padding-top: 20%;
  }

  /* Caption zone: fixed height, sits below graphic zone, never moves content above */
  .pres-caption-zone {
    width: 100%;
    max-width: 420px;
    height: 7rem;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 1rem;
    flex-shrink: 0;
  }

  .pres-footer {
    padding: 0.75rem 1.25rem;
    padding-bottom: calc(0.75rem + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--rule);
  }

  .pres-back-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: 'Nunito', sans-serif;
    font-size: 0.8rem;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 0.25rem 0.5rem;
    transition: color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .pres-back-btn:hover { color: var(--white); }

  /* ── Chapter pie progress ─────────────────────────────────── */
  .pres-pie-wrap {
    width: 2.8rem;
    height: 2.8rem;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }

  .pres-pie-wrap svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  .pres-pie-slice {
    transition: opacity 0.4s ease;
    cursor: pointer;
  }

  /* ── Scene elements ───────────────────────────────────────── */

  .scene-title {
    font-size: clamp(1.4rem, 5vw, 2rem);
    font-weight: 900;
    color: var(--white);
    text-align: center;
    line-height: 1.15;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 1.4s cubic-bezier(0.25, 0, 0.1, 1), transform 1.4s cubic-bezier(0.25, 0, 0.1, 1);
  }

  .scene-title.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .scene-body {
    font-size: clamp(1.35rem, 4.5vw, 1.65rem);
    font-weight: 600;
    color: var(--muted);
    text-align: center;
    line-height: 1.2;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 1.4s cubic-bezier(0.25, 0, 0.1, 1) 0.3s, transform 1.4s cubic-bezier(0.25, 0, 0.1, 1) 0.3s;
  }

  .scene-body.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .scene-highlight {
    color: var(--orange);
    font-weight: 900;
  }

  .scene-graphic {
    opacity: 0;
    transform: scale(0.94);
    transition: opacity 1.2s cubic-bezier(0.25, 0, 0.1, 1) 0.2s, transform 1.2s cubic-bezier(0.25, 0, 0.1, 1) 0.2s;
  }

  .scene-graphic.visible {
    opacity: 1;
    transform: scale(1);
  }

  /* For persistent graphics that should not fade in/out between beats */
  #bd-month, #bd-day {
    color: var(--orange);
  }
  #bd-month option, #bd-day option {
    color: var(--white);
    background: var(--bg);
  }
    color: #1e7a0e;
    font-weight: 900;
  }
  .cal-cell.highlighted.today > span {
    color: #1e7a0e;
  }

  /* ── Presentation nav arrows (above footer) ──────────────── */
  .pres-nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 1.25rem 0.5rem;
    min-height: 3.2rem;
  }

  .pres-nav-btn {
    width: 3.2rem; height: 3.2rem;
    background: transparent;
    border: 1.5px solid var(--rule);
    border-radius: 8px;
    color: var(--muted);
    font-size: 1.5rem;
    font-weight: 800;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.4s ease, transform 0.35s cubic-bezier(0.4,0,0.2,1), color 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
    opacity: 0;
    pointer-events: none;
  }
  .pres-nav-btn:hover { color: var(--orange); border-color: var(--orange); }
  .pres-nav-btn:active { transform: translateY(1px); }

  .pres-nav-btn.visible {
    opacity: 1;
    pointer-events: auto;
  }
  .pres-nav-btn.fade-out {
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
  }
  /* back btn slides in from left, fwd from right */
  .pres-nav-back { transform: translateX(-2rem); }
  .pres-nav-back.visible { transform: translateX(0); }
  .pres-nav-fwd  { transform: translateX(2rem); }
  .pres-nav-fwd.visible  { transform: translateX(0); }
    bottom: 1rem;
    right: 1.25rem;
    font-size: 0.6rem;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--rule);
    opacity: 0;
    transition: opacity 1s ease 1.5s;
  }
  .tap-hint.visible { opacity: 1; }
</style>
</head>
<body>

<!-- ── Birthday Intro Screen ─────────────────────────────────── -->
<div id="birthday-screen" style="
  position:fixed;inset:0;background:var(--bg);z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2rem 1.5rem;
  transition:opacity 0.5s ease;
">
  <div id="bd-question" style="
    font-family:'Nunito',sans-serif;font-size:clamp(2rem,7vw,2.8rem);font-weight:900;
    color:var(--white);text-align:center;margin-bottom:1.8rem;
    opacity:0;transform:translateY(20px);transition:opacity 1.4s ease,transform 1.4s ease;
  ">What's your birthday?</div>

  <div id="bd-month-wrap" style="
    opacity:0;transform:translateX(-60px);transition:opacity 0.7s ease,transform 0.7s cubic-bezier(0.4,0,0.2,1);
    display:flex;gap:0.75rem;align-items:center;
  ">
    <select id="bd-month" style="
      font-family:'Nunito',sans-serif;font-size:1.2rem;font-weight:700;
      background:rgba(255,255,255,0.1);border:1.5px solid var(--rule);border-radius:10px;
      color:var(--orange);padding:0.5rem 0.75rem;cursor:pointer;
      -webkit-appearance:none;appearance:none;text-align:center;text-align-last:center;
    ">
      <option value="">Month</option>
      <option value="0">January</option><option value="1">February</option>
      <option value="2">March</option><option value="3">April</option>
      <option value="4">May</option><option value="5">June</option>
      <option value="6">July</option><option value="7">August</option>
      <option value="8">September</option><option value="9">October</option>
      <option value="10">November</option><option value="11">December</option>
    </select>
    <div id="bd-day-wrap" style="
      opacity:0;transform:translateX(60px);transition:opacity 0.7s ease,transform 0.7s cubic-bezier(0.4,0,0.2,1);
    ">
      <select id="bd-day" style="
        font-family:'Nunito',sans-serif;font-size:1.2rem;font-weight:700;
        background:rgba(255,255,255,0.1);border:1.5px solid var(--rule);border-radius:10px;
        color:var(--orange);padding:0.5rem 0.75rem;cursor:pointer;
        -webkit-appearance:none;appearance:none;text-align:center;min-width:4.5rem;
      ">
        <option value="">Date</option>
        <option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option><option value="11">11</option><option value="12">12</option><option value="13">13</option><option value="14">14</option><option value="15">15</option><option value="16">16</option><option value="17">17</option><option value="18">18</option><option value="19">19</option><option value="20">20</option><option value="21">21</option><option value="22">22</option><option value="23">23</option><option value="24">24</option><option value="25">25</option><option value="26">26</option><option value="27">27</option><option value="28">28</option><option value="29">29</option><option value="30">30</option><option value="31">31</option>
      </select>
    </div>
  </div>

  <div id="bd-disclaimer" style="
    font-family:'Nunito',sans-serif;font-size:clamp(1rem,3.5vw,1.2rem);font-weight:700;
    color:var(--white);text-align:center;margin-top:1.8rem;max-width:320px;
    opacity:0;transition:opacity 1.0s ease;
  ">(Don't worry. I'm not collecting your data. Go ahead and lie to me, if you like.)</div>

  <button id="bd-arrow" onclick="submitBirthday()" style="
    margin-top:1.8rem;
    background:transparent;border:2px solid var(--orange);border-radius:14px;
    color:var(--orange);font-size:1.6rem;font-weight:900;
    padding:0.6rem 1.4rem;cursor:pointer;
    opacity:0;transform:translateX(3rem);
    transition:opacity 0.5s ease,transform 0.5s cubic-bezier(0.4,0,0.2,1),background 0.2s;
    -webkit-tap-highlight-color:transparent;
  ">&#8594;</button>

  <button onclick="devSkipToTarget()" style="
    position:absolute;bottom:1.5rem;right:1.5rem;
    background:transparent;border:1px solid var(--rule);border-radius:6px;
    color:var(--muted);font-family:'Nunito',sans-serif;font-size:0.65rem;
    font-weight:800;letter-spacing:0.08em;text-transform:uppercase;
    padding:0.3rem 0.6rem;cursor:pointer;opacity:0.4;
    -webkit-tap-highlight-color:transparent;
  ">Skip</button>
</div>

<!-- ── Birthday Result Screen ─────────────────────────────────── -->
<div id="birthday-result" style="
  position:fixed;inset:0;background:var(--bg);z-index:199;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2rem 1.5rem;pointer-events:none;opacity:0;
  transition:opacity 0.5s ease;
">
  <div id="bd-result-label" style="

    <!-- Scene content renders here -->
  </div>

      padding:0.3rem 0.6rem;cursor:pointer;opacity:0.4;
    ">Jump</button>

<script>
  const GREG_DAYS   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const FARCH_DAYS  = ["Sun","Mon","Wed","Thu","Fri","Sat"];
  const GREG_MONTHS = ["January","February","March","April","May","June",
                       "July","August","September","October","November","December"];
  const FARCH_MONTHS = ["","January","February","March","April","May","June",
                        "July","August","September","October","November","December"];

  function isLeapYear(y) {
    return (y % 4 === 0 && y % 100 !== 0) || (y % 400 === 0);
  }

  function gregorianToFarch(gDate) {
    const year = gDate.getUTCFullYear();
    const dec22 = new Date(Date.UTC(year, 11, 22));
    let farchYear, farchYearStart;
    if (gDate >= dec22) {
      farchYear = year + 1;
      farchYearStart = dec22;
    } else {
      farchYear = year;
      farchYearStart = new Date(Date.UTC(year - 1, 11, 22));
    }
    const dayOfYear = Math.round((gDate - farchYearStart) / 86400000) + 1;
    if (dayOfYear <= 360) {
      const farchMonth = Math.ceil(dayOfYear / 30);
      const farchDay = ((dayOfYear - 1) % 30) + 1;
      const dayName = FARCH_DAYS[(farchDay - 1) % 6];
      return {
        year: farchYear, month: farchMonth,
        monthName: FARCH_MONTHS[farchMonth],
        day: farchDay, dayName, isFarch: false,
        formatted: `${dayName}, ${FARCH_MONTHS[farchMonth]} ${farchDay}, ${farchYear}`
      };
    } else {
      const farchDay = dayOfYear - 360;
      const maxFarch = isLeapYear(farchYear) ? 6 : 5;
      if (farchDay > maxFarch) return { error: true };
      return {
        year: farchYear, month: 13, monthName: "Farch",
        day: farchDay, dayName: null, isFarch: true,
        formatted: `Farch ${farchDay}, ${farchYear}`
      };
    }
  }

  function farchToGregorian(farchYear, farchMonth, farchDay) {
    const farchYearStart = new Date(Date.UTC(farchYear - 1, 11, 22));
    const dayOfYear = farchMonth <= 12
      ? (farchMonth - 1) * 30 + farchDay
      : 360 + farchDay;
    return new Date(farchYearStart.getTime() + (dayOfYear - 1) * 86400000);
  }

  let currentDate = null;

  // Track previous month IDs to detect month changes
  let prevGregMonthId  = null;
  let prevFarchMonthId = null;

  function monthId(y, m)  { return `${y}-${m}`; }
  function gregMonthId(d) { return monthId(d.getUTCFullYear(), d.getUTCMonth()); }
  function farchMonthId(r){ return r ? monthId(r.year, r.month) : null; }

  // ── Slide animation ──────────────────────────────────────────
  function slideCalendar(bodyEl, slideEl, direction, renderFn) {
    const outClass = direction > 0 ? 'slide-out-left'  : 'slide-out-right';
    const inClass  = direction > 0 ? 'slide-in-left'   : 'slide-in-right';

    // Clean up any orphaned slides from a previous rapid animation
    bodyEl.querySelectorAll('.cal-slide:not(.slide-active)').forEach(el => el.remove());

    // Measure current height and lock it
    const oldHeight = slideEl.offsetHeight;
    bodyEl.style.height = oldHeight + 'px';

    // Create new slide off-screen and render into it
    const newSlide = document.createElement('div');
    newSlide.className = `cal-slide ${inClass}`;
    newSlide.style.visibility = 'hidden';
    bodyEl.appendChild(newSlide);
    renderFn(newSlide);

    // Measure new height
    const newHeight = newSlide.offsetHeight;
    newSlide.style.visibility = '';

    // Start slide animation and height tween simultaneously
    requestAnimationFrame(() => {
      bodyEl.style.height = newHeight + 'px';

      slideEl.classList.remove('slide-active');
      slideEl.classList.add(outClass);
      newSlide.classList.remove(inClass);
      newSlide.classList.add('slide-active');

      setTimeout(() => {
        slideEl.remove();
        bodyEl.style.height = '';
      }, 300);
    });

    return newSlide;
  }

  // ── Holiday icons ────────────────────────────────────────────
  const HOLIDAY_ICONS = {
    halloween: 'assets/halloween.png',
    christmas: 'assets/christmas.png',
    turkey:    'assets/turkey.png',
    newyears:  'assets/newyears.png',
  };

  // Return icon key if this Greg date is a holiday, else null
  function gregHoliday(y, m, d) {
    // m is 0-based
    if (m === 9  && d === 31) return 'halloween';   // Oct 31
    if (m === 11 && d === 25) return 'christmas';   // Dec 25
    if (m === 11 && d === 31) return 'newyears';    // Dec 31
    // Thanksgiving: 4th Thursday in November
    if (m === 10) {
      let thursdays = 0;
      for (let day = 1; day <= d; day++) {
        if (new Date(Date.UTC(y, 10, day)).getUTCDay() === 4) thursdays++;
      }
      if (thursdays === 4 && new Date(Date.UTC(y, 10, d)).getUTCDay() === 4) return 'turkey';
    }
    return null;
  }

  // Return icon key if this Farch date is a holiday, else null
  function farchHoliday(farchMonth, farchDay, farchYear) {
    if (farchMonth === 10 && farchDay === 30) return 'halloween';  // Oct 30
    if (farchMonth === 11 && farchDay === 22) return 'turkey';     // Nov 22
    if (farchMonth === 12 && farchDay === 25) return 'christmas';  // Dec 25
    if (farchMonth === 13) {
      const maxFarch = isLeapYear(farchYear) ? 6 : 5;
      if (farchDay === maxFarch) return 'newyears';                // Last day of Farch
    }
    return null;
  }

  function holidayImg(key) {
    return `<span><img src="${HOLIDAY_ICONS[key]}" class="holiday-icon" alt="${key}"></span>`;
  }

  // ── Render Greg calendar into a container ───────────────────
  function buildGregContent(container, y, m, highlightDay) {
    const grid = document.createElement('div');
    grid.className = 'cal-grid greg';
    grid.id = 'greg-grid';

    GREG_DAYS.forEach(d => {
      const h = document.createElement('div');
      h.className = 'cal-day-header';
      h.textContent = d;
      grid.appendChild(h);
    });

    const firstDow = new Date(Date.UTC(y, m, 1)).getUTCDay();
    for (let i = 0; i < firstDow; i++) {
      const e = document.createElement('div');
      e.className = 'cal-cell empty';
      e.innerHTML = '<span></span>';
      grid.appendChild(e);
    }

    const daysInMonth = new Date(Date.UTC(y, m + 1, 0)).getUTCDate();
    for (let d = 1; d <= daysInMonth; d++) {
      const cell = document.createElement('div');
      const isHighlighted = d === highlightDay;
      const isToday = isTodayGreg(y, m, d);
      cell.className = 'cal-cell' + (isHighlighted ? ' highlighted' : '') + (isToday ? ' today' : '');
      const icon = gregHoliday(y, m, d);
      cell.innerHTML = icon ? holidayImg(icon) : `<span>${d}</span>`;
      const day = d;
      cell.addEventListener('click', () => setDate(new Date(Date.UTC(y, m, day))));
      grid.appendChild(cell);
    }

    container.appendChild(grid);
  }

  let farchNoteShown = false;

  // ── Render Farch calendar into a container ──────────────────
  function buildFarchContent(container, result) {
    if (!result || result.error) return;
    const farchYear = result.year;

    if (result.isFarch) {
      const intercal = document.createElement('div');
      intercal.className = 'cal-farch-intercal';
      intercal.id = 'farch-intercal';
      const maxDays = isLeapYear(farchYear) ? 6 : 5;
      for (let i = 1; i <= maxDays; i++) {
        const cell = document.createElement('div');
        const isHighlighted = i === result.day;
        const isToday = isTodayFarch(farchYear, 13, i);
        cell.className = 'cal-cell' + (isHighlighted ? ' highlighted' : '') + (isToday ? ' today' : '');
        const icon = farchHoliday(13, i, farchYear);
        if (icon) {
          cell.innerHTML = holidayImg(icon);
        } else {
          cell.innerHTML = `<span style="${!isHighlighted ? 'color:var(--orange)' : ''}">${i}</span>`;
        }
        const dayNum = i;
        cell.addEventListener('click', () => setDate(farchToGregorian(farchYear, 13, dayNum)));
        intercal.appendChild(cell);
      }
      container.appendChild(intercal);

      if (!farchNoteShown) {
        const note = document.createElement('div');
        note.className = 'cal-farch-note';
        note.id = 'cal-farch-note';
        note.textContent = 'Farch is outside the regular calendar. No weekdays.';
        container.appendChild(note);
        farchNoteShown = true;
      }
    } else {
      const grid = document.createElement('div');
      grid.className = 'cal-grid farch-cal';
      grid.id = 'farch-grid';

      FARCH_DAYS.forEach(d => {
        const h = document.createElement('div');
        h.className = 'cal-day-header';
        h.textContent = d;
        grid.appendChild(h);
      });

      const fMonth = result.month;
      for (let d = 1; d <= 30; d++) {
        const cell = document.createElement('div');
        const isHighlighted = d === result.day;
        const isToday = isTodayFarch(farchYear, result.month, d);
        cell.className = 'cal-cell' + (isHighlighted ? ' highlighted' : '') + (isToday ? ' today' : '');
        const icon = farchHoliday(fMonth, d, farchYear);
        cell.innerHTML = icon ? holidayImg(icon) : `<span>${d}</span>`;
        const dayNum = d;
        cell.addEventListener('click', () => setDate(farchToGregorian(farchYear, fMonth, dayNum)));
        grid.appendChild(cell);
      }
      container.appendChild(grid);
    }
  }

  // ── Main render ─────────────────────────────────────────────
  function updateDisplay(direction) {
    const d = currentDate;
    const result = gregorianToFarch(d);

    // Update conversion box
    const dispEl = document.getElementById('farch-display');
    if (!result || result.error) {
      dispEl.textContent = "—";
    } else if (result.isFarch) {
      dispEl.innerHTML = `Farch ${result.day}<br><span style="color:var(--white)">${result.year}</span>`;
      dispEl.className = 'farch-display is-farch-period';
    } else {
      dispEl.innerHTML = `<span class="day-name">${result.dayName}</span>, ${result.monthName.slice(0,3)} ${result.day}<br>${result.year}`;
      dispEl.className = 'farch-display';
    }

    // Check if month changed
    const newGregId  = gregMonthId(d);
    const newFarchId = farchMonthId(result);
    const gregChanged  = prevGregMonthId  !== null && newGregId  !== prevGregMonthId;
    const farchChanged = prevFarchMonthId !== null && newFarchId !== prevFarchMonthId;

    // If direction wasn't supplied by an arrow, infer it from whether we moved forward or back
    function inferDir(changed, oldId, newId) {
      if (!changed) return 0;
      if (direction !== 0) return direction;
      if (!oldId) return 1;
      const [oy, om] = oldId.split('-').map(Number);
      const [ny, nm] = newId.split('-').map(Number);
      return (ny * 100 + nm) > (oy * 100 + om) ? 1 : -1;
    }

    const gregDir  = inferDir(gregChanged,  prevGregMonthId,  newGregId);
    const farchDir = inferDir(farchChanged, prevFarchMonthId, newFarchId);

    // Update Gregorian calendar
    const gregMonthLabel = document.getElementById('greg-month-label');
    gregMonthLabel.textContent = `${GREG_MONTHS[d.getUTCMonth()].slice(0,3)} ${d.getUTCFullYear()}`;

    const gregBody = document.getElementById('greg-body');
    let gregSlide  = gregBody.querySelector('.cal-slide.slide-active');

    if (gregChanged && gregDir !== 0) {
      gregSlide = slideCalendar(gregBody, gregSlide, gregDir, (container) => {
        buildGregContent(container, d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate());
      });
    } else {
      gregSlide.innerHTML = '';
      buildGregContent(gregSlide, d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate());
    }

    // Update Farch calendar
    const farchMonthLabel = document.getElementById('farch-month-label');
    if (result && !result.error) {
      if (result.isFarch) {
        farchMonthLabel.innerHTML = `<span style="color:var(--orange)">Farch</span> ${result.year}`;
      } else {
        farchMonthLabel.textContent = `${result.monthName.slice(0,3)} ${result.year}`;
      }
    }

    const farchBody = document.getElementById('farch-body');
    let farchSlide  = farchBody.querySelector('.cal-slide.slide-active');

    if (farchChanged && farchDir !== 0) {
      farchSlide = slideCalendar(farchBody, farchSlide, farchDir, (container) => {
        buildFarchContent(container, result);
      });
    } else {
      farchSlide.innerHTML = '';
      buildFarchContent(farchSlide, result);
    }

    prevGregMonthId  = newGregId;
    prevFarchMonthId = newFarchId;
  }

  function setDate(d, direction) {
    currentDate = d;
    const y   = d.getUTCFullYear();
    const dayNames   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    document.getElementById('old-date-display').innerHTML =
      `${dayNames[d.getUTCDay()]}, ${monthNames[d.getUTCMonth()]} ${d.getUTCDate()}<br>${y}`;
    updateDisplay(direction ?? 0);
  }

  function stepDate(delta) {
    if (!currentDate) return;
    setDate(new Date(currentDate.getTime() + delta * 86400000), delta);
  }

  // ── Month jump ───────────────────────────────────────────────
  function stepMonth(delta) {
    if (!currentDate) return;

    const result = gregorianToFarch(currentDate);
    if (!result || result.error) return;

    const currentFarchDay = result.day;

    // Target: same Farch day number, 30 days forward/back in Farch
    let targetFarchMonth, targetFarchYear, targetFarchDay;

    if (result.isFarch) {
      // Currently in Farch intercalary
      if (delta > 0) {
        // Jump to Farch January of next year, same day (capped at 30)
        targetFarchYear  = result.year + 1;
        targetFarchMonth = 1;
        targetFarchDay   = Math.min(currentFarchDay, 30);
      } else {
        // Jump to Farch December of same year, same day (capped at 30)
        targetFarchYear  = result.year;
        targetFarchMonth = 12;
        targetFarchDay   = Math.min(currentFarchDay, 30);
      }
    } else {
      const newMonth = result.month + delta;
      if (newMonth < 1) {
        // Crossing back into Farch of previous year
        targetFarchYear  = result.year - 1;
        targetFarchMonth = 13;
        const maxFarch = isLeapYear(targetFarchYear) ? 6 : 5;
        targetFarchDay = Math.min(currentFarchDay, maxFarch);
      } else if (newMonth > 12) {
        // Crossing forward into Farch
        targetFarchYear  = result.year;
        targetFarchMonth = 13;
        const maxFarch = isLeapYear(targetFarchYear) ? 6 : 5;
        targetFarchDay = Math.min(currentFarchDay, maxFarch);
      } else {
        targetFarchYear  = result.year;
        targetFarchMonth = newMonth;
        targetFarchDay   = currentFarchDay;
      }
    }

    const newGreg = farchToGregorian(targetFarchYear, targetFarchMonth, targetFarchDay);
    setDate(newGreg, delta);
  }

  // ── Presentation Engine ──────────────────────────────────────

  // Each chapter is an array of beats. Each beat is a function
  // that receives the scene container and renders into it.
  const CHAPTERS = [

    // ── Chapter 1: The Problem ───────────────────────────────────
    // No pie slice during this chapter — pie only appears from ch2 onward
    [
      // Beat 1: opening statement
      (scene) => {
        scene.innerHTML = `
          <div class="scene-title">Our calendar is stupid<br>and no one likes it.</div>
        `;
        animate(scene);
      },
      // Beat 2: 7 slides in from left, circle from right, then 7 slices fade in one by one
      (scene) => {
        const r = 70, rCirc = 72, cx = 80, cy = 80;
        const sliceSVG = Array.from({length:7}, (_,i) => {
          const a1 = (i * 2*Math.PI/7) - Math.PI/2;
          const a2 = a1 + 2*Math.PI/7;
          const x1 = (cx + r*Math.cos(a1)).toFixed(3); const y1 = (cy + r*Math.sin(a1)).toFixed(3);
          const x2 = (cx + r*Math.cos(a2)).toFixed(3); const y2 = (cy + r*Math.sin(a2)).toFixed(3);
          return `<path id="slice7-${i}" d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 0 1 ${x2},${y2} Z" fill="#3a9fd5" stroke="#ffffff" stroke-width="2.5" opacity="0"/>`;
        }).join('');

        scene.innerHTML = `
          <div id="seven-wrap" class="scene-graphic" style="display:flex;align-items:center;gap:1rem;justify-content:center;overflow:hidden;padding-left:1.5rem;">
            <div id="seven-num" style="transform:translateX(-120px);opacity:0;transition:transform 0.5s cubic-bezier(0.4,0,0.2,1),opacity 0.5s ease;">
              <svg viewBox="0 0 362 457" width="80" height="101" xmlns="http://www.w3.org/2000/svg">
                <text xml:space="preserve" x="3.78" y="428" font-family="'Work Sans',sans-serif" font-size="576" font-weight="700" fill="#ffffff">7</text>
              </svg>
            </div>
            <div id="seven-circle" style="transform:translateX(120px);opacity:0;transition:transform 0.5s cubic-bezier(0.4,0,0.2,1),opacity 0.5s ease;">
              <svg id="seven-svg" width="160" height="160" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
                <circle cx="${cx}" cy="${cy}" r="${rCirc}" fill="#ffffff"/>
                ${sliceSVG}

  function animate(scene) {
    const body = scene.querySelector('.scene-body');
    const zone = document.getElementById('caption-zone');
    if (body && zone) { zone.innerHTML = ''; zone.appendChild(body); }
    requestAnimationFrame(() => {
      scene.querySelectorAll('.scene-title, .scene-graphic').forEach(el => {
        requestAnimationFrame(() => el.classList.add('visible'));
      });
      if (zone) zone.querySelectorAll('.scene-body').forEach(el => {
        requestAnimationFrame(() => el.classList.add('visible'));
      });
    });
  }

    requestAnimationFrame(() => {
      if (zone) zone.querySelectorAll('.scene-body').forEach(el => {

  function renderBeat() {
    const wmExists = document.getElementById('wm-wrap');
    const wmBeats = new Set([7,8,9,10,11]);
    const isWmBeat = currentChapter === 0 && wmBeats.has(currentBeat);

    const tueExists = document.getElementById('tue-scene');
    const tueBeats = new Set([2,3,4,5]); // ch2 beats 3-6 (0-indexed 2-5)
    const isTueBeat = currentChapter === 1 && tueBeats.has(currentBeat);

    const titleExists = document.getElementById('title-13a') || document.getElementById('title-ch2-a');
    const isTitleBeat = (currentChapter === 0 && currentBeat === 13) ||
                        (currentChapter === 1 && currentBeat === 1);

    if (!(wmExists && isWmBeat) && !(titleExists && isTitleBeat) && !(tueExists && isTueBeat)) {
      const screen = document.getElementById('pres-screen');
      screen.innerHTML = '<div class="scene" id="current-scene"></div><div class="pres-caption-zone" id="caption-zone"></div>';
    }

    const scene = document.getElementById('current-scene') || document.querySelector('.scene');
    CHAPTERS[currentChapter][currentBeat](scene);
    drawProgressPie();
    updateBackArrow();

    // Update debug beat label
    const beatLabel = document.getElementById('beat-label');
    if (beatLabel) beatLabel.textContent = `${currentChapter + 1}-${currentBeat + 1}`;

    if (isLastBeat()) {
      hideFwdArrow(true);
    } else {
      const delay = presFirstBeat ? 1400 : 0;
      presFirstBeat = false;
      showFwdArrow(delay);
    }
  }

  let presFirstBeat = true; // track if this is the very first beat of the session
  let presDirection = 1;    // 1 = forward, -1 = backward
  let presNavFwdTimer = null;
  let presNavFwdVisible = false; // track whether fwd arrow is currently shown

  function showFwdArrow(delay) {
    const btn = document.getElementById('pres-nav-fwd');
    if (!btn) return;
    clearTimeout(presNavFwdTimer);
    if (presNavFwdVisible) {
      // Already visible — no animation needed, just ensure classes are right
      btn.classList.remove('fade-out');
      btn.classList.add('visible');
      return;
    }
    // First appearance — slide in after delay
    btn.classList.remove('visible', 'fade-out');
    presNavFwdTimer = setTimeout(() => {
      btn.classList.add('visible');
      presNavFwdVisible = true;
    }, delay);
  }

  function hideFwdArrow(fade) {
    const btn = document.getElementById('pres-nav-fwd');
    if (!btn) return;
    clearTimeout(presNavFwdTimer);
    presNavFwdVisible = false;
    if (fade) {
      btn.classList.remove('visible');
      btn.classList.add('fade-out');
    } else {
      btn.classList.remove('visible', 'fade-out');
    }
  }

  function updateBackArrow() {
    const btn = document.getElementById('pres-nav-back');
    if (!btn) return;
    const hasPrev = currentChapter > 0 || currentBeat > 0;
    if (hasPrev) {
      btn.classList.add('visible');
    } else {
      btn.classList.remove('visible');
    }
  }

  function isLastBeat() {
    return currentChapter === TOTAL_CHAPTERS - 1 &&
           currentBeat === CHAPTERS[currentChapter].length - 1;
  }

  function presGoForward() {
    presDirection = 1;
    const chapter = CHAPTERS[currentChapter];

    // Cut directly from Week/Month video to Month/Year video — no fade, hold last frame
    const wmAnim = document.getElementById('wm-anim-wrap');
    const leavingWmAnim = wmAnim && currentChapter === 0 && currentBeat === 10;
    if (leavingWmAnim) {
      if (currentBeat < chapter.length - 1) { currentBeat++; }
      else if (currentChapter < TOTAL_CHAPTERS - 1) { currentChapter++; currentBeat = 0; }
      else return;
      renderBeat();
      return;
    }

    // Animate out slide-in scenes before advancing
    const leavingSevenCircle     = currentChapter === 0 && currentBeat === 4; // beat 5 (0-indexed)
    const leavingThirtyoneCircle = currentChapter === 0 && currentBeat === 5; // beat 6 (0-indexed)

    if (leavingSevenCircle || leavingThirtyoneCircle) {
      const numEl  = leavingSevenCircle
        ? document.getElementById('seven-num')
        : document.getElementById('thirtyone-num');
      const circEl = leavingSevenCircle
        ? document.getElementById('seven-circle')
        : document.getElementById('thirtyone-circle');
      const slid = numEl && numEl.style.opacity !== '0' && (
        numEl.style.transform === 'translateX(0px)' ||
        numEl.style.transform === 'translateX(0)' ||
        numEl.style.transform === ''
      );
      if (slid) {
        numEl.style.transition  = 'transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease';
        circEl.style.transition = 'transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease';
        numEl.style.transform   = 'translateX(-140px)'; numEl.style.opacity  = '0';
        circEl.style.transform  = 'translateX(140px)';  circEl.style.opacity = '0';
        if (currentBeat < chapter.length - 1) { currentBeat++; }
        else if (currentChapter < TOTAL_CHAPTERS - 1) { currentChapter++; currentBeat = 0; }
        else return;
        setTimeout(() => renderBeat(), 360);
        return;
      }
    }

    if (currentBeat < chapter.length - 1) {
      currentBeat++;
    } else if (currentChapter < TOTAL_CHAPTERS - 1) {
      currentChapter++;
      currentBeat = 0;
    } else {
      return;
    }
    renderBeat();
  }

  function presGoBack() {
    presDirection = -1;
    if (currentBeat > 0) {
      currentBeat--;
    } else if (currentChapter > 0) {
      currentChapter--;
      currentBeat = CHAPTERS[currentChapter].length - 1;
    } else {
      return;
    }

    // If leaving the week/month animation beat, fade it out
    const wmAnim = document.getElementById('wm-anim-wrap');
    if (wmAnim && currentChapter === 0 && currentBeat === 10) {
      const vid = document.getElementById('wm-video');
      if (vid) { vid.style.transition = 'opacity 0.3s ease'; vid.style.opacity = '0'; }
      setTimeout(() => renderBeat(), 350);
      return;
    }

    // If the current scene has slide-in elements, animate them out first
    const numEl  = document.getElementById('thirtyone-num') || document.getElementById('seven-num');
    const circEl = document.getElementById('thirtyone-circle') || document.getElementById('seven-circle');
    const isSlideScene = numEl && circEl &&
      (numEl.style.transform === 'translateX(0px)' || numEl.style.transform === 'translateX(0)');

    if (isSlideScene) {
      numEl.style.transition  = 'transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease';
      circEl.style.transition = 'transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease';
      numEl.style.transform   = 'translateX(-140px)';
      numEl.style.opacity     = '0';
      circEl.style.transform  = 'translateX(140px)';
      circEl.style.opacity    = '0';
      setTimeout(() => renderBeat(), 360);
    } else {
      renderBeat();
    }
  }

  // Positions slash images over their target number elements by reading live DOM rects
  function positionSlashes() {
    const wrap = document.getElementById('wm-wrap');
    if (!wrap) return;
    const wrapRect = wrap.getBoundingClientRect();
    [['slash1','wm-n31'],['slash2','wm-n30'],['slash3','wm-n28']].forEach(([slashId, numId]) => {
      const slash = document.getElementById(slashId);
      const num   = document.getElementById(numId);
      if (!slash || !num) return;
      const r = num.getBoundingClientRect();
      const wr = wrap.getBoundingClientRect();
      const cx = r.left - wr.left + r.width  / 2;
      const cy = r.top  - wr.top  + r.height / 2;
      const fontSize = parseFloat(getComputedStyle(document.documentElement).fontSize);
      const w = parseFloat(slash.style.width) * fontSize;
      slash.style.left = (cx - w / 2) + 'px';
      slash.style.top  = (cy - w * 0.38) + 'px';
    });
  }

  // Draws a wobbly, variable-weight marker slash across a number in the SVG.
  // Multiple overlapping lines at slight angle/position offsets simulate real marker feel.
  function wmSlash(svg, x1, y1, x2, y2) {
    const strokes = [
      { dx1:  0,   dy1:  1,   dx2:  0,   dy2: -1,   w: 2.5, op: 0.7 },
      { dx1:  1,   dy1:  0,   dx2: -1,   dy2:  0,   w: 5,   op: 0.9 },
      { dx1: -0.5, dy1:  1.5, dx2:  0.5, dy2: -1.5, w: 7,   op: 1.0 },
      { dx1:  0.5, dy1: -1,   dx2: -0.5, dy2:  1,   w: 4,   op: 0.8 },
      { dx1:  1.5, dy1:  0.5, dx2: -1.5, dy2: -0.5, w: 2,   op: 0.6 },
    ];
    const len = Math.hypot(x2 - x1, y2 - y1);
    strokes.forEach(s => {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', x1 + s.dx1); line.setAttribute('y1', y1 + s.dy1);
      line.setAttribute('x2', x2 + s.dx2); line.setAttribute('y2', y2 + s.dy2);
      line.setAttribute('stroke', '#cc3333');
      line.setAttribute('stroke-width', s.w);
      line.setAttribute('stroke-linecap', 'round');
      line.setAttribute('opacity', s.op);
      line.setAttribute('stroke-dasharray', len + 10);
      line.style.strokeDashoffset = len + 10;
      line.style.transition = 'stroke-dashoffset 0.35s cubic-bezier(0.4,0,0.2,1)';
      svg.appendChild(line);
    });
    requestAnimationFrame(() => requestAnimationFrame(() => {
      svg.querySelectorAll('line').forEach(l => { l.style.strokeDashoffset = 0; });
    }));
  }

  // Same but fully drawn immediately — for slashes that persist from a previous beat
  function wmSlashStatic(svg, x1, y1, x2, y2) {
    const strokes = [
      { dx1:  0,   dy1:  1,   dx2:  0,   dy2: -1,   w: 2.5, op: 0.7 },
      { dx1:  1,   dy1:  0,   dx2: -1,   dy2:  0,   w: 5,   op: 0.9 },
      { dx1: -0.5, dy1:  1.5, dx2:  0.5, dy2: -1.5, w: 7,   op: 1.0 },
      { dx1:  0.5, dy1: -1,   dx2: -0.5, dy2:  1,   w: 4,   op: 0.8 },
      { dx1:  1.5, dy1:  0.5, dx2: -1.5, dy2: -0.5, w: 2,   op: 0.6 },
    ];
    strokes.forEach(s => {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', x1 + s.dx1); line.setAttribute('y1', y1 + s.dy1);
      line.setAttribute('x2', x2 + s.dx2); line.setAttribute('y2', y2 + s.dy2);
      line.setAttribute('stroke', '#cc3333');
      line.setAttribute('stroke-width', s.w);
      line.setAttribute('stroke-linecap', 'round');
      line.setAttribute('opacity', s.op);
      svg.appendChild(line);
    });
  }

  function drawProgressPie() {
    const svg = document.getElementById('pres-pie-svg');
    const wrap = document.getElementById('pres-pie-wrap');
    if (!svg || !wrap) return;
    svg.innerHTML = '';

    const cx = 22, cy = 22, r = 18;
    const completedChapters = currentChapter;

    if (completedChapters === 0) {
      wrap.style.pointerEvents = 'none';
      wrap.style.transform = 'translate(60px, 60px)';
      wrap.style.opacity = '0';
      return;
    }

    // Slide in from bottom-right the first time the pie appears
    const wasHidden = wrap.style.opacity === '0' || wrap.style.transform === 'translate(60px, 60px)';
    if (wasHidden) {
      wrap.style.transition = 'none';
      wrap.style.transform = 'translate(60px, 60px)';
      wrap.style.opacity = '0';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        wrap.style.transition = 'transform 0.5s cubic-bezier(0.4,0,0.2,1), opacity 0.5s ease';
        wrap.style.transform = 'translate(0,0)';
        wrap.style.opacity = '1';
      }));
    }

    wrap.style.pointerEvents = 'auto';

    // Background circle (white, low opacity) — always visible when pie is shown
    const ghost = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    ghost.setAttribute('cx', cx); ghost.setAttribute('cy', cy); ghost.setAttribute('r', r);
    ghost.setAttribute('fill', 'rgba(255,255,255,0.25)');
    ghost.setAttribute('stroke', 'rgba(255,255,255,0.5)');
    ghost.setAttribute('stroke-width', '1');
    svg.appendChild(ghost);

    const PIE_SLICES = 6; // always 6 — matches the 6-day week; chapter 1 has no slice
    const angleStep = (2 * Math.PI) / PIE_SLICES;

    for (let i = 0; i < completedChapters; i++) {
      const startAngle = i * angleStep - Math.PI / 2;
      const endAngle   = startAngle + angleStep;
      const x1 = cx + r * Math.cos(startAngle);
      const y1 = cy + r * Math.sin(startAngle);
      const x2 = cx + r * Math.cos(endAngle);
      const y2 = cy + r * Math.sin(endAngle);
      const largeArc = angleStep > Math.PI ? 1 : 0;

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', `M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${largeArc} 1 ${x2},${y2} Z`);
      path.setAttribute('fill', '#f5a623');
      path.setAttribute('stroke', '#1a4a6e');
      path.setAttribute('stroke-width', '1');
      svg.appendChild(path);
    }
  }

  function pieGoBack(e) {
    e.stopPropagation();
    if (currentChapter > 0) {
      currentChapter--;
      currentBeat = 0;
      renderBeat();
    }
  }

  function devSkipToTarget() {
    // Dev skip — change these to jump to any beat
    const targetChapter = 1; // 0-indexed (chapter 2 = index 1)
    const targetBeat    = 1; // 0-indexed (beat 2 = index 1)

    // Hide birthday screen immediately
    const bd = document.getElementById('birthday-screen');
    bd.style.opacity = '0';
    bd.style.pointerEvents = 'none';
    setTimeout(() => { bd.style.display = 'none'; }, 300);

    // Open presentation, then override the chapter/beat it resets to
    openPresentation();
    setTimeout(() => {
      currentChapter = targetChapter;
      currentBeat    = targetBeat;
      renderBeat();
    }, 350);
  }

  function debugJump() {
    // Jump to just before the video beats for easy testing
    currentChapter = 0;
    currentBeat = 9; // beat 10 (0-indexed) — one tap away from videos
    renderBeat();
  }

  function openPresentation() {
    currentChapter = 0;
    currentBeat    = 0;

    const whyEl   = document.getElementById('anim-why-farch');
    const convEl  = document.getElementById('anim-converter');
    const leftEl  = document.getElementById('anim-left');
    const rightEl = document.getElementById('anim-right');
    const mPrev   = document.getElementById('anim-month-prev');
    const mNext   = document.getElementById('anim-month-next');
    const dPrev   = document.getElementById('anim-day-prev');
    const dNext   = document.getElementById('anim-day-next');

    whyEl.classList.add('exit-down');

    setTimeout(() => {
      convEl.classList.add('exit-up');
      leftEl.classList.add('exit-left');
      rightEl.classList.add('exit-right');
      mPrev.classList.add('exit-left');
      mNext.classList.add('exit-right');
      dPrev.classList.add('exit-left');
      dNext.classList.add('exit-right');
    }, 80);

    setTimeout(() => {
      const overlay = document.getElementById('pres-overlay');
      overlay.style.transition = 'none';
      overlay.style.transform  = 'none';
      overlay.style.opacity    = '0';
      overlay.classList.add('open');
      requestAnimationFrame(() => {
        overlay.style.transition = 'opacity 0.3s ease';
        overlay.style.opacity    = '1';
      });
      renderBeat();
      presFirstBeat = true;
      presNavFwdVisible = false;
      document.getElementById('pres-pie-wrap').addEventListener('click', pieGoBack);
    }, 520);
  }

  function closePresentation() {
    const overlay = document.getElementById('pres-overlay');
    overlay.style.transition = 'opacity 0.3s ease';
    overlay.style.opacity    = '0';

    setTimeout(() => {
      overlay.classList.remove('open');
      overlay.style.transition = '';
      overlay.style.transform  = '';
      overlay.style.opacity    = '';

      const convEl  = document.getElementById('anim-converter');
      const leftEl  = document.getElementById('anim-left');
      const rightEl = document.getElementById('anim-right');
      const mPrev   = document.getElementById('anim-month-prev');
      const mNext   = document.getElementById('anim-month-next');
      const dPrev   = document.getElementById('anim-day-prev');
      const dNext   = document.getElementById('anim-day-next');
      const whyEl   = document.getElementById('anim-why-farch');

      leftEl.classList.remove('exit-left');
      rightEl.classList.remove('exit-right');
      mPrev.classList.remove('exit-left');
      mNext.classList.remove('exit-right');
      dPrev.classList.remove('exit-left');
      dNext.classList.remove('exit-right');

      setTimeout(() => { convEl.classList.remove('exit-up'); }, 80);
      setTimeout(() => { whyEl.classList.remove('exit-down'); }, 160);

    }, 300);
  }

  // ── Interactive 360 wheel ────────────────────────────────────
  const DIVISIONS = [2, 3, 4, 5, 6, 8, 9, 10, 12, 15, 18, 20, 24, 30, 36, 40, 45, 60, 72, 90, 120, 180, 360];
  let divIndex = 0;

  function buildInteractive360() {
    return `
      <div class="scene-graphic" style="display:flex;flex-direction:column;align-items:center;gap:0.75rem;">
        <svg id="div360-svg" width="160" height="160" viewBox="0 0 160 160"></svg>
        <div style="display:flex;gap:0.5rem;align-items:center;">
          <button class="nav-btn" onclick="event.stopPropagation();stepDivision(-1)" style="width:2rem;height:2rem;font-size:1rem;">&#8592;</button>
          <div id="div360-label" style="font-size:1.1rem;font-weight:900;color:var(--orange);min-width:5rem;text-align:center;"></div>
          <button class="nav-btn" onclick="event.stopPropagation();stepDivision(1)" style="width:2rem;height:2rem;font-size:1rem;">&#8594;</button>
        </div>
      </div>
      <div class="scene-body">360 divides evenly by <span class="scene-highlight">24 different numbers</span>. Try them all.</div>
    `;
  }

  function initInteractive360(scene) {
    divIndex = 3; // start at ÷5
    drawDivision();
  }

  function stepDivision(delta) {
    divIndex = (divIndex + delta + DIVISIONS.length) % DIVISIONS.length;
    drawDivision();
  }

  function drawDivision() {
    const svg = document.getElementById('div360-svg');
    const label = document.getElementById('div360-label');
    if (!svg || !label) return;
    const n = DIVISIONS[divIndex];
    label.textContent = `÷ ${n} = ${360/n}°`;
    svg.innerHTML = buildPieSlices(n, Array.from({length:n},(_,i)=>i), '#f5a623', '#1f5480', 76, 80, 80);
  }

  function buildPieSlices(n, filledIndices, fillColor, emptyColor, r=60, cx=70, cy=70) {
    const slices = [];
    const angleStep = (2 * Math.PI) / n;
    for (let i = 0; i < n; i++) {
      const startAngle = i * angleStep - Math.PI / 2;
      const endAngle   = startAngle + angleStep;
      const x1 = cx + r * Math.cos(startAngle);
      const y1 = cy + r * Math.sin(startAngle);
      const x2 = cx + r * Math.cos(endAngle);
      const y2 = cy + r * Math.sin(endAngle);
      const largeArc = angleStep > Math.PI ? 1 : 0;
      const fill = filledIndices.includes(i) ? fillColor : emptyColor;
      slices.push(`<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${largeArc} 1 ${x2},${y2} Z" fill="${fill}" stroke="#1a4a6e" stroke-width="1.5"/>`);
    }
    // Outer circle stroke
    slices.push(`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#93bcd8" stroke-width="1.5" opacity="0.4"/>`);
    return slices.join('');
  }
  // ── Birthday Intro ───────────────────────────────────────────
  let birthdayGreg = null; // stores the user's Greg birthday Date for converter default
  const bdTimers = [];     // stores pending timeout IDs so they can be cancelled

  function bdUpdateDays() {
    const monthSel = document.getElementById('bd-month');
    const daySel   = document.getElementById('bd-day');
    const m = parseInt(monthSel.value);
    const prevDay = daySel.value;
    // Build day options for selected month (use a non-leap year for Feb)
    const maxDay = isNaN(m) ? 31 : new Date(Date.UTC(2001, m + 1, 0)).getUTCDate();
    daySel.innerHTML = '<option value="">Date</option>';
    for (let d = 1; d <= maxDay; d++) {
      const opt = document.createElement('option');
      opt.value = d; opt.textContent = d;
      daySel.appendChild(opt);
    }
    if (prevDay && parseInt(prevDay) <= maxDay) daySel.value = prevDay;
    bdCheckReady();
  }

  function bdCheckReady() {
    const m = document.getElementById('bd-month').value;
    const d = document.getElementById('bd-day').value;
    const arrow = document.getElementById('bd-arrow');
    if (m !== '' && d !== '') {
      arrow.style.opacity = '1';
      arrow.style.transform = 'translateX(0)';
      arrow.style.pointerEvents = 'auto';
    } else {
      arrow.style.opacity = '0';
      arrow.style.transform = 'translateX(3rem)';
      arrow.style.pointerEvents = 'none';
    }
  }

  function bdConfetti() {
    const canvas = document.getElementById('bd-confetti');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const cx = W / 2, cy = H / 2;
    const colors = ['#f5a623','#f5a623','#f5a623','#ffffff','#ffd580'];

    const particles = Array.from({length: 48}, (_, i) => {
      const side = i % 2 === 0 ? -1 : 1;
      const angle = (Math.random() * 0.9 + 0.05) * Math.PI; // mostly sideways
      const speed = 3 + Math.random() * 5;
      return {
        x: cx + side * (Math.random() * 20),
        y: cy,
        vx: side * Math.cos(angle) * speed,
        vy: -(Math.sin(angle) * speed + Math.random() * 2),
        r: 3 + Math.random() * 4,
        color: colors[Math.floor(Math.random() * colors.length)],
        alpha: 1,
        gravity: 0.18 + Math.random() * 0.1,
      };
    });

    let frame;
    function draw() {
      ctx.clearRect(0, 0, W, H);
      let alive = false;
      particles.forEach(p => {
        p.x  += p.vx;
        p.y  += p.vy;
        p.vy += p.gravity;
        p.vx *= 0.98;
        p.alpha -= 0.018;
        if (p.alpha <= 0) return;
        alive = true;
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
      if (alive) frame = requestAnimationFrame(draw);
    }
    draw();
  }

  function ordinal(n) {
    const s = ['th','st','nd','rd'];
    const v = n % 100;
    return n + (s[(v-20)%10] || s[v] || s[0]);
  }

  function submitBirthday() {
    const m = parseInt(document.getElementById('bd-month').value);
    const d = parseInt(document.getElementById('bd-day').value);
    if (isNaN(m) || isNaN(d)) return;

    // Prevent re-triggering if result screen already visible
    const resultScreen = document.getElementById('birthday-result');
    if (resultScreen.style.opacity === '1') return;

    const now = new Date();
    const yr  = now.getFullYear();
    const gregDate = new Date(Date.UTC(yr, m, d));
    birthdayGreg = gregDate;

    const farchResult = gregorianToFarch(gregDate);
    let farchStr;
    if (farchResult.isFarch) {
      farchStr = `Farch ${ordinal(farchResult.day)}`;
    } else {
      farchStr = `${FARCH_MONTHS[farchResult.month]} ${ordinal(farchResult.day)}`;
    }

    // Fade out intro screen
    const introScreen = document.getElementById('birthday-screen');
    introScreen.style.opacity = '0';
    introScreen.style.pointerEvents = 'none';
    // Remove from hit-testing entirely after fade completes
    setTimeout(() => { introScreen.style.display = 'none'; }, 600);

    // Fade in result screen
    resultScreen.style.pointerEvents = 'auto';
    resultScreen.style.opacity = '1';

    // Store timeout IDs so enterApp can cancel them
    bdTimers.forEach(t => clearTimeout(t));
    bdTimers.length = 0;

    // Label fades in after 1.0s delay
    bdTimers.push(setTimeout(() => {
      const label = document.getElementById('bd-result-label');
      label.style.opacity = '1';

      // Shake loops until date appears
      bdTimers.push(setTimeout(() => {
        label.classList.add('bd-shake');
      }, 1100));
    }, 1000));

    // Date fades in 3.0s after label appears (4.0s total)
    bdTimers.push(setTimeout(() => {
      const dateEl = document.getElementById('bd-result-date');
      const label  = document.getElementById('bd-result-label');
      dateEl.textContent = farchStr;
      dateEl.style.opacity = '1';

      // Stop shake
      label.classList.remove('bd-shake');

      // Fire confetti
      bdConfetti();

      // Cupcake slides up
      bdTimers.push(setTimeout(() => {
        const cake = document.getElementById('bd-cupcake');
        cake.style.opacity = '1';
        cake.style.transform = 'translateY(0)';
      }, 400));
    }, 4000));

    // CTA button slides up 2.5s after date appears
    bdTimers.push(setTimeout(() => {
      const cta = document.getElementById('bd-cta');
      cta.style.opacity       = '1';
      cta.style.transform     = 'translateY(0)';
      cta.style.pointerEvents = 'auto';
      // Wire both touchstart and click to ensure full-button tap on iOS
      let fired = false;
      const handler = (e) => {
        e.preventDefault();
        if (fired) return;
        fired = true;
        enterApp();
      };
      cta.addEventListener('touchstart', handler, { passive: false });
      cta.addEventListener('click', handler);
    }, 6500));
  }

  function enterApp() {
    // Cancel any pending birthday timers
    bdTimers.forEach(t => clearTimeout(t));
    bdTimers.length = 0;

    // Disable CTA immediately to prevent double-tap
    const cta = document.getElementById('bd-cta');
    cta.style.pointerEvents = 'none';
    cta.style.opacity   = '0';
    cta.style.transform = 'translateY(2rem)';

    // Stop shake if still running
    const label = document.getElementById('bd-result-label');
    if (label) label.classList.remove('bd-shake');

    setTimeout(() => {
      const resultScreen = document.getElementById('birthday-result');
      resultScreen.style.opacity = '0';
      resultScreen.style.pointerEvents = 'none';
      setTimeout(() => { resultScreen.style.display = 'none'; }, 500);
    }, 200);

    // Trigger main app curtain-in — defaulting to birthday if set
    const now   = new Date();
    const today = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
    const startDate = birthdayGreg || today;

    // Run the curtain animation
    curtainIn(startDate);
  }

  function curtainIn(startDate) {
    const convEl   = document.getElementById('anim-converter');
    const leftEl   = document.getElementById('anim-left');
    const rightEl  = document.getElementById('anim-right');
    const mPrev    = document.getElementById('anim-month-prev');
    const mNext    = document.getElementById('anim-month-next');
    const dPrev    = document.getElementById('anim-day-prev');
    const dNext    = document.getElementById('anim-day-next');
    const whyEl    = document.getElementById('anim-why-farch');
    const shareEl  = document.getElementById('share-btn');
    const allEls   = [convEl, leftEl, rightEl, mPrev, mNext, dPrev, dNext, whyEl];

    // Position all elements off-screen instantly
    allEls.forEach(el => { el.style.transition = 'none'; });
    if (shareEl) { shareEl.style.transition = 'none'; shareEl.style.display = 'block'; }

    convEl.classList.add('exit-up');
    leftEl.classList.add('exit-left');
    rightEl.classList.add('exit-right');
    mPrev.classList.add('exit-left');   mNext.classList.add('exit-right');
    dPrev.classList.add('exit-left');   dNext.classList.add('exit-right');
    whyEl.classList.add('exit-down');
    if (shareEl) shareEl.classList.add('exit-down');

    setDate(startDate, 0);

    requestAnimationFrame(() => {
      allEls.forEach(el => { el.style.transition = ''; });
      if (shareEl) shareEl.style.transition = '';

      // 1. Converter drops from top
      setTimeout(() => convEl.classList.remove('exit-up'), 50);

      // 2. Greg calendar slides in from left (1.0s after converter starts — extra pause to let it land)
      setTimeout(() => leftEl.classList.remove('exit-left'), 1100);

      // 3. Farch calendar slides in from right (0.5s after Greg)
      setTimeout(() => rightEl.classList.remove('exit-right'), 1650);

      // 4. Why Farch? slides up (0.5s after calendars)
      setTimeout(() => whyEl.classList.remove('exit-down'), 2200);

      // 5. Share slides up (0.5s after Why Farch?)
      setTimeout(() => {
        if (shareEl) shareEl.classList.remove('exit-down');
      }, 2750);

      // 6. Day arrows slide in simultaneously from both sides (0.5s after Share)
      setTimeout(() => {
        dPrev.classList.remove('exit-left');
        dNext.classList.remove('exit-right');
      }, 3300);

      // 7. Month arrows slide in simultaneously (0.5s after day arrows)
      setTimeout(() => {
        mPrev.classList.remove('exit-left');
        mNext.classList.remove('exit-right');
      }, 3850);
    });
  }

  function shareFarch() {
    const m = birthdayGreg ? birthdayGreg.getUTCMonth() : null;
    const d = birthdayGreg ? birthdayGreg.getUTCDate()  : null;
    let farchStr = '';
    if (m !== null && d !== null) {
      const now = new Date();
      const gregDate = new Date(Date.UTC(now.getFullYear(), m, d));
      const farchResult = gregorianToFarch(gregDate);
      if (farchResult.isFarch) {
        farchStr = `Farch ${farchResult.day}`;
      } else {
        farchStr = `${FARCH_MONTHS[farchResult.month]} ${farchResult.day}`;
      }
    }
    const url = window.location.href.split('?')[0];
    const text = farchStr
      ? `My Farch birthday is ${farchStr}\n${url}`
      : `Find out your Farch birthday:\n${url}`;

    if (navigator.share) {
      navigator.share({ text });
    } else {
      // Fallback: copy to clipboard
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('share-btn');
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = orig; }, 2000);
      });
    }
  }

  // ── Today date highlighting ──────────────────────────────────
  // Store today's exact date for grid highlighting
  const _todayNow = new Date();
  const TODAY_GREG = new Date(Date.UTC(_todayNow.getFullYear(), _todayNow.getMonth(), _todayNow.getDate()));
  const TODAY_FARCH = gregorianToFarch(TODAY_GREG);

  function isTodayGreg(y, m, d) {
    return y === TODAY_GREG.getUTCFullYear() &&
           m === TODAY_GREG.getUTCMonth() &&
           d === TODAY_GREG.getUTCDate();
  }

  function isTodayFarch(farchYear, farchMonth, farchDay) {
    return farchYear  === TODAY_FARCH.year &&
           farchMonth === TODAY_FARCH.month &&
           farchDay   === TODAY_FARCH.day;
  }


  document.addEventListener('DOMContentLoaded', () => {
    const now   = new Date();
    const today = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));

    // Keep main app off-screen initially — birthday screen shows first
    const convEl  = document.getElementById('anim-converter');
    const leftEl  = document.getElementById('anim-left');
    const rightEl = document.getElementById('anim-right');
    const mPrev   = document.getElementById('anim-month-prev');
    const mNext   = document.getElementById('anim-month-next');
    const dPrev   = document.getElementById('anim-day-prev');
    const dNext   = document.getElementById('anim-day-next');
    const whyEl   = document.getElementById('anim-why-farch');
    const allEls  = [convEl, leftEl, rightEl, mPrev, mNext, dPrev, dNext, whyEl];

    allEls.forEach(el => { el.style.transition = 'none'; });
    convEl.classList.add('exit-up');
    leftEl.classList.add('exit-left');
    rightEl.classList.add('exit-right');
    mPrev.classList.add('exit-left');  mNext.classList.add('exit-right');
    dPrev.classList.add('exit-left');  dNext.classList.add('exit-right');
    whyEl.classList.add('exit-down');
    allEls.forEach(el => { el.style.transition = ''; });

    // Pre-render calendar at today's date so it's ready
    setDate(today, 0);

    // Wire birthday selectors
    document.getElementById('bd-month').addEventListener('change', bdUpdateDays);
    document.getElementById('bd-day').addEventListener('change', bdCheckReady);

    // Animate birthday screen in — slow, rhythmic sequence
    requestAnimationFrame(() => requestAnimationFrame(() => {
      // Question fades in after 0.5s delay, over 1.4s
      setTimeout(() => {
        const q = document.getElementById('bd-question');
        q.style.opacity = '1'; q.style.transform = 'translateY(0)';
      }, 500);

      // Month selector slides in from left after 1.5s
      setTimeout(() => {
        const mw = document.getElementById('bd-month-wrap');
        mw.style.opacity = '1'; mw.style.transform = 'translateX(0)';
      }, 1500);

      // Day selector slides in from right after 2.5s
      setTimeout(() => {
        const dw = document.getElementById('bd-day-wrap');
        dw.style.opacity = '1'; dw.style.transform = 'translateX(0)';
      }, 2500);

      // Disclaimer after 4.0s
      setTimeout(() => {
        document.getElementById('bd-disclaimer').style.opacity = '1';
      }, 4000);
    }));



    // Prevent all zoom — double-tap, pinch, and gesture
    // Prevent double-tap zoom — skip buttons so rapid tapping works freely
    let lastTap = 0;
    document.addEventListener('touchend', e => {
      if (e.target.closest('button')) return; // buttons never trigger zoom
      const now = Date.now();
      if (now - lastTap < 300) e.preventDefault();
      lastTap = now;
    }, { passive: false });

    document.addEventListener('touchstart', e => {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });

    document.addEventListener('gesturestart',  e => e.preventDefault(), { passive: false });
    document.addEventListener('gesturechange', e => e.preventDefault(), { passive: false });
    document.addEventListener('gestureend',    e => e.preventDefault(), { passive: false });
    document.addEventListener('touchmove', e => {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });
  });
</script>
